<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truck Driver Expense Tracker</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .card-hover {
            transition: all 0.3s ease;
        }
        
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        
        .file-upload-area {
            border: 2px dashed #d1d5db;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .file-upload-area:hover {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
        
        .tag-badge {
            transition: all 0.2s ease;
        }
        
        .tag-badge:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        const { useState, useEffect, createContext, useContext } = React;

        // Data storage keys
        const STORAGE_KEYS = {
            USERS: 'tdems_users',
            EXPENSES: 'tdems_expenses',
            TAGS: 'tdems_tags',
            CURRENT_USER: 'tdems_current_user'
        };

        // Default expense categories and tags
        const DEFAULT_TAGS = [
            { id: 'fuel', name: 'Fuel', color: '#ef4444', icon: 'fa-gas-pump' },
            { id: 'maintenance', name: 'Maintenance', color: '#f59e0b', icon: 'fa-wrench' },
            { id: 'food', name: 'Food & Meals', color: '#10b981', icon: 'fa-utensils' },
            { id: 'lodging', name: 'Lodging', color: '#6366f1', icon: 'fa-bed' },
            { id: 'tolls', name: 'Tolls & Fees', color: '#8b5cf6', icon: 'fa-road' },
            { id: 'insurance', name: 'Insurance', color: '#ec4899', icon: 'fa-shield-alt' },
            { id: 'supplies', name: 'Supplies', color: '#14b8a6', icon: 'fa-box' },
            { id: 'other', name: 'Other', color: '#6b7280', icon: 'fa-ellipsis-h' }
        ];

        // Initialize default admin if no users exist
        const initializeData = () => {
            const users = JSON.parse(localStorage.getItem(STORAGE_KEYS.USERS) || '[]');
            if (users.length === 0) {
                const defaultAdmin = {
                    id: 'admin-001',
                    username: 'admin',
                    password: 'admin123',
                    role: 'admin',
                    name: 'Fleet Manager',
                    createdAt: new Date().toISOString()
                };
                localStorage.setItem(STORAGE_KEYS.USERS, JSON.stringify([defaultAdmin]));
            }

            // Initialize default tags if none exist
            const tags = JSON.parse(localStorage.getItem(STORAGE_KEYS.TAGS) || '[]');
            if (tags.length === 0) {
                localStorage.setItem(STORAGE_KEYS.TAGS, JSON.stringify(DEFAULT_TAGS));
            }
        };

        // Generate driver ID
        const generateDriverId = () => {
            const randomNum = Math.floor(1000 + Math.random() * 9000);
            return `DR-${randomNum}`;
        };

        // Convert file to base64
        const fileToBase64 = (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        };

        // Format currency
        const formatCurrency = (amount) => {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD'
            }).format(amount);
        };

        // View file function
        const viewFile = (receipt) => {
            if (receipt && receipt.data) {
                const newWindow = window.open();
                if (receipt.type.startsWith('image/')) {
                    newWindow.document.write(`
                        <html>
                            <head><title>Receipt - ${receipt.name}</title></head>
                            <body style="margin:0;padding:20px;text-align:center;background:#f5f5f5;">
                                <img src="${receipt.data}" style="max-width:100%;max-height:90vh;box-shadow:0 4px 6px rgba(0,0,0,0.1);" />
                                <p style="margin-top:20px;"><a href="javascript:window.close()">Close</a></p>
                            </body>
                        </html>
                    `);
                } else if (receipt.type === 'application/pdf') {
                    newWindow.document.write(`
                        <html>
                            <head><title>Receipt - ${receipt.name}</title></head>
                            <body style="margin:0;padding:20px;text-align:center;background:#f5f5f5;">
                                <iframe src="${receipt.data}" style="width:100%;height:90vh;border:none;"></iframe>
                                <p style="margin-top:20px;"><a href="javascript:window.close()">Close</a></p>
                            </body>
                        </html>
                    `);
                }
            }
        };

        // Auth Context
        const AuthContext = createContext();

        // Login Component
        const Login = () => {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleSubmit = (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');
                
                const users = JSON.parse(localStorage.getItem(STORAGE_KEYS.USERS) || '[]');
                const user = users.find(u => u.username === username && u.password === password);
                
                if (user) {
                    localStorage.setItem(STORAGE_KEYS.CURRENT_USER, JSON.stringify(user));
                    // Update state immediately instead of reloading
                    setCurrentUser(user);
                } else {
                    setError('Invalid username or password');
                }
                setLoading(false);
            };

            return React.createElement('div', {
                className: 'min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4'
            }, [
                React.createElement('div', {
                    className: 'bg-white rounded-2xl shadow-xl p-8 w-full max-w-md fade-in'
                }, [
                    React.createElement('div', {
                        className: 'text-center mb-8'
                    }, [
                        React.createElement('div', {
                            className: 'w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center mx-auto mb-4'
                        }, [
                            React.createElement('i', {
                                className: 'fas fa-truck text-white text-2xl'
                            })
                        ]),
                        React.createElement('h1', {
                            className: 'text-3xl font-bold text-gray-800'
                        }, 'Expense Tracker'),
                        React.createElement('p', {
                            className: 'text-gray-600 mt-2'
                        }, 'Truck Driver Expense Management')
                    ]),
                    
                    React.createElement('form', {
                        onSubmit: handleSubmit,
                        className: 'space-y-6'
                    }, [
                        React.createElement('div', null, [
                            React.createElement('label', {
                                className: 'block text-sm font-medium text-gray-700 mb-2'
                            }, 'Username'),
                            React.createElement('div', {
                                className: 'relative'
                            }, [
                                React.createElement('div', {
                                    className: 'absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none'
                                }, [
                                    React.createElement('i', {
                                        className: 'fas fa-user text-gray-400'
                                    })
                                ]),
                                React.createElement('input', {
                                    type: 'text',
                                    value: username,
                                    onChange: (e) => setUsername(e.target.value),
                                    className: 'pl-10 w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent',
                                    placeholder: 'Enter username',
                                    required: true
                                })
                            ])
                        ]),
                        
                        React.createElement('div', null, [
                            React.createElement('label', {
                                className: 'block text-sm font-medium text-gray-700 mb-2'
                            }, 'Password'),
                            React.createElement('div', {
                                className: 'relative'
                            }, [
                                React.createElement('div', {
                                    className: 'absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none'
                                }, [
                                    React.createElement('i', {
                                        className: 'fas fa-lock text-gray-400'
                                    })
                                ]),
                                React.createElement('input', {
                                    type: 'password',
                                    value: password,
                                    onChange: (e) => setPassword(e.target.value),
                                    className: 'pl-10 w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent',
                                    placeholder: 'Enter password',
                                    required: true
                                })
                            ])
                        ]),
                        
                        error && React.createElement('div', {
                            className: 'bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg'
                        }, error),
                        
                        React.createElement('button', {
                            type: 'submit',
                            disabled: loading,
                            className: 'w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition duration-200 disabled:opacity-50'
                        }, loading ? 'Signing in...' : 'Sign In')
                    ]),
                    
                    React.createElement('div', {
                        className: 'mt-6 text-center text-sm text-gray-600'
                    }, 'Default Admin: admin / admin123')
                ])
            ]);
        };

        // User Management Component (Admin only)
        const UserManagement = () => {
            const [users, setUsers] = useState([]);
            const [showAddUser, setShowAddUser] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [newUser, setNewUser] = useState({
                username: '',
                password: '',
                name: '',
                role: 'driver'
            });

            useEffect(() => {
                loadUsers();
            }, []);

            const loadUsers = () => {
                const allUsers = JSON.parse(localStorage.getItem(STORAGE_KEYS.USERS) || '[]');
                setUsers(allUsers);
            };

            const handleAddUser = () => {
                if (!newUser.username || !newUser.password || !newUser.name) {
                    alert('Please fill all fields');
                    return;
                }

                const allUsers = JSON.parse(localStorage.getItem(STORAGE_KEYS.USERS) || '[]');
                
                // Check if username already exists
                if (allUsers.find(u => u.username === newUser.username)) {
                    alert('Username already exists');
                    return;
                }

                const user = {
                    id: newUser.role === 'driver' ? generateDriverId() : `admin-${Date.now()}`,
                    ...newUser,
                    createdAt: new Date().toISOString()
                };

                allUsers.push(user);
                localStorage.setItem(STORAGE_KEYS.USERS, JSON.stringify(allUsers));
                loadUsers();
                setNewUser({ username: '', password: '', name: '', role: 'driver' });
                setShowAddUser(false);
            };

            const handleDeleteUser = (userId) => {
                if (confirm('Are you sure you want to delete this user?')) {
                    const allUsers = JSON.parse(localStorage.getItem(STORAGE_KEYS.USERS) || '[]');
                    const filtered = allUsers.filter(u => u.id !== userId);
                    localStorage.setItem(STORAGE_KEYS.USERS, JSON.stringify(filtered));
                    loadUsers();
                }
            };

            const filteredUsers = users.filter(user =>
                user.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                user.username.toLowerCase().includes(searchTerm.toLowerCase()) ||
                user.id.toLowerCase().includes(searchTerm.toLowerCase())
            );

            return React.createElement('div', {
                className: 'space-y-6'
            }, [
                React.createElement('div', {
                    className: 'flex justify-between items-center'
                }, [
                    React.createElement('h2', {
                        className: 'text-2xl font-bold text-gray-800'
                    }, 'Driver Management'),
                    React.createElement('button', {
                        onClick: () => setShowAddUser(true),
                        className: 'bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition'
                    }, [
                        React.createElement('i', {
                            className: 'fas fa-plus mr-2'
                        }),
                        'Add Driver'
                    ])
                ]),

                React.createElement('div', {
                    className: 'relative'
                }, [
                    React.createElement('input', {
                        type: 'text',
                        value: searchTerm,
                        onChange: (e) => setSearchTerm(e.target.value),
                        className: 'w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg',
                        placeholder: 'Search drivers...'
                    }),
                    React.createElement('i', {
                        className: 'fas fa-search absolute left-3 top-3 text-gray-400'
                    })
                ]),

                showAddUser && React.createElement('div', {
                    className: 'bg-white p-6 rounded-lg shadow-lg border fade-in'
                }, [
                    React.createElement('h3', {
                        className: 'text-lg font-semibold mb-4'
                    }, 'Add New Driver'),
                    React.createElement('div', {
                        className: 'grid grid-cols-1 md:grid-cols-2 gap-4'
                    }, [
                        React.createElement('input', {
                            type: 'text',
                            value: newUser.name,
                            onChange: (e) => setNewUser({...newUser, name: e.target.value}),
                            className: 'px-4 py-2 border border-gray-300 rounded-lg',
                            placeholder: 'Full Name'
                        }),
                        React.createElement('input', {
                            type: 'text',
                            value: newUser.username,
                            onChange: (e) => setNewUser({...newUser, username: e.target.value}),
                            className: 'px-4 py-2 border border-gray-300 rounded-lg',
                            placeholder: 'Username'
                        }),
                        React.createElement('input', {
                            type: 'password',
                            value: newUser.password,
                            onChange: (e) => setNewUser({...newUser, password: e.target.value}),
                            className: 'px-4 py-2 border border-gray-300 rounded-lg',
                            placeholder: 'Password'
                        }),
                        React.createElement('select', {
                            value: newUser.role,
                            onChange: (e) => setNewUser({...newUser, role: e.target.value}),
                            className: 'px-4 py-2 border border-gray-300 rounded-lg'
                        }, [
                            React.createElement('option', {
                                value: 'driver'
                            }, 'Driver'),
                            React.createElement('option', {
                                value: 'admin'
                            }, 'Admin')
                        ])
                    ]),
                    React.createElement('div', {
                        className: 'flex gap-2 mt-4'
                    }, [
                        React.createElement('button', {
                            onClick: handleAddUser,
                            className: 'bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700'
                        }, [
                            React.createElement('i', {
                                className: 'fas fa-save mr-2'
                            }),
                            'Save'
                        ]),
                        React.createElement('button', {
                            onClick: () => setShowAddUser(false),
                            className: 'bg-gray-500 text-white px-4 py-2 rounded-lg hover:bg-gray-600'
                        }, 'Cancel')
                    ])
                ]),

                React.createElement('div', {
                    className: 'bg-white rounded-lg shadow overflow-hidden'
                }, [
                    React.createElement('table', {
                        className: 'w-full'
                    }, [
                        React.createElement('thead', {
                            className: 'bg-gray-50'
                        }, [
                            React.createElement('tr', null, [
                                React.createElement('th', {
                                    className: 'px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider'
                                }, 'ID'),
                                React.createElement('th', {
                                    className: 'px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider'
                                }, 'Name'),
                                React.createElement('th', {
                                    className: 'px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider'
                                }, 'Username'),
                                React.createElement('th', {
                                    className: 'px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider'
                                }, 'Role'),
                                React.createElement('th', {
                                    className: 'px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider'
                                }, 'Actions')
                            ])
                        ]),
                        React.createElement('tbody', {
                            className: 'bg-white divide-y divide-gray-200'
                        }, 
                        filteredUsers.map(user => 
                            React.createElement('tr', {
                                key: user.id,
                                className: 'hover:bg-gray-50'
                            }, [
                                React.createElement('td', {
                                    className: 'px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900'
                                }, user.id),
                                React.createElement('td', {
                                    className: 'px-6 py-4 whitespace-nowrap text-sm text-gray-900'
                                }, user.name),
                                React.createElement('td', {
                                    className: 'px-6 py-4 whitespace-nowrap text-sm text-gray-900'
                                }, user.username),
                                React.createElement('td', {
                                    className: 'px-6 py-4 whitespace-nowrap'
                                }, [
                                    React.createElement('span', {
                                        className: `inline-flex px-2 py-1 text-xs font-semibold rounded-full ${
                                            user.role === 'admin' 
                                                ? 'bg-purple-100 text-purple-800' 
                                                : 'bg-blue-100 text-blue-800'
                                        }`
                                    }, user.role)
                                ]),
                                React.createElement('td', {
                                    className: 'px-6 py-4 whitespace-nowrap text-sm'
                                }, 
                                    user.username !== 'admin' ? 
                                        React.createElement('button', {
                                            onClick: () => handleDeleteUser(user.id),
                                            className: 'text-red-600 hover:text-red-900'
                                        }, [
                                            React.createElement('i', {
                                                className: 'fas fa-trash'
                                            })
                                        ]) : 
                                        React.createElement('span', {
                                            className: 'text-gray-400'
                                        }, 'Protected')
                                )
                            ])
                        )
                    ])
                ])
            ])
        };

        // Expense Management Component
        const ExpenseManagement = () => {
            const [expenses, setExpenses] = useState([]);
            const [showAddExpense, setShowAddExpense] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedTags, setSelectedTags] = useState([]);
            const [tags, setTags] = useState([]);
            const [newExpense, setNewExpense] = useState({
                title: '',
                amount: '',
                date: new Date().toISOString().split('T')[0],
                description: '',
                tags: [],
                receipt: null
            });

            const authContext = useContext(AuthContext);
            const currentUser = authContext?.currentUser;

            useEffect(() => {
                loadExpenses();
                loadTags();
            }, []);

            const loadExpenses = () => {
                const allExpenses = JSON.parse(localStorage.getItem(STORAGE_KEYS.EXPENSES) || '[]');
                setExpenses(allExpenses);
            };

            const loadTags = () => {
                const allTags = JSON.parse(localStorage.getItem(STORAGE_KEYS.TAGS) || '[]');
                setTags(allTags);
            };

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    const base64 = await fileToBase64(file);
                    setNewExpense({
                        ...newExpense,
                        receipt: {
                            name: file.name,
                            type: file.type,
                            data: base64
                        }
                    });
                }
            };

            const handleAddExpense = () => {
                if (!newExpense.title || !newExpense.amount) {
                    alert('Please fill required fields');
                    return;
                }

                const expense = {
                    id: `exp-${Date.now()}`,
                    ...newExpense,
                    driverId: currentUser.id,
                    driverName: currentUser.name,
                    driverUsername: currentUser.username,
                    amount: parseFloat(newExpense.amount),
                    createdAt: new Date().toISOString()
                };

                const allExpenses = JSON.parse(localStorage.getItem(STORAGE_KEYS.EXPENSES) || '[]');
                allExpenses.push(expense);
                localStorage.setItem(STORAGE_KEYS.EXPENSES, JSON.stringify(allExpenses));
                loadExpenses();
                setNewExpense({
                    title: '',
                    amount: '',
                    date: new Date().toISOString().split('T')[0],
                    description: '',
                    tags: [],
                    receipt: null
                });
                setShowAddExpense(false);
            };

            const filteredExpenses = expenses.filter(expense => {
                const matchesSearch = 
                    expense.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    expense.description.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    expense.driverName.toLowerCase().includes(searchTerm.toLowerCase());
                
                const matchesTags = selectedTags.length === 0 || 
                    selectedTags.some(tagId => expense.tags.includes(tagId));
                
                // Drivers can only see their own expenses
                if (currentUser.role === 'driver') {
                    return matchesSearch && matchesTags && expense.driverId === currentUser.id;
                }
                
                return matchesSearch && matchesTags;
            });

            const totalExpenses = filteredExpenses.reduce((sum, exp) => sum + exp.amount, 0);

            return React.createElement('div', {
                className: 'space-y-6'
            }, [
                React.createElement('div', {
                    className: 'flex justify-between items-center'
                }, [
                    React.createElement('div', null, [
                        React.createElement('h2', {
                            className: 'text-2xl font-bold text-gray-800'
                        }, currentUser.role === 'admin' ? 'All Expenses' : 'My Expenses'),
                        React.createElement('p', {
                            className: 'text-lg text-blue-600 font-semibold'
                        }, `Total: ${formatCurrency(totalExpenses)}`)
                    ]),
                    currentUser.role === 'driver' && React.createElement('button', {
                        onClick: () => setShowAddExpense(true),
                        className: 'bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition'
                    }, [
                        React.createElement('i', {
                            className: 'fas fa-plus mr-2'
                        }),
                        'Add Expense'
                    ])
                ]),

                React.createElement('div', {
                    className: 'flex gap-4'
                }, [
                    React.createElement('div', {
                        className: 'flex-1 relative'
                    }, [
                        React.createElement('input', {
                            type: 'text',
                            value: searchTerm,
                            onChange: (e) => setSearchTerm(e.target.value),
                            className: 'w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg',
                            placeholder: 'Search expenses...'
                        }),
                        React.createElement('i', {
                            className: 'fas fa-search absolute left-3 top-3 text-gray-400'
                        })
                    ]),
                    React.createElement('div', {
                        className: 'flex gap-2 flex-wrap'
                    }, 
                    tags.map(tag => 
                        React.createElement('button', {
                            key: tag.id,
                            onClick: () => setSelectedTags(
                                selectedTags.includes(tag.id) 
                                    ? selectedTags.filter(t => t !== tag.id)
                                    : [...selectedTags, tag.id]
                            ),
                            className: `px-3 py-1 rounded-full text-sm font-medium tag-badge ${
                                selectedTags.includes(tag.id)
                                    ? 'ring-2 ring-offset-2'
                                    : ''
                            }`,
                            style: {
                                backgroundColor: selectedTags.includes(tag.id) ? tag.color : '#f3f4f6',
                                color: selectedTags.includes(tag.id) ? 'white' : '#374151',
                                ringColor: tag.color
                            }
                        }, [
                            React.createElement('i', {
                                className: `fas ${tag.icon} mr-1`
                            }),
                            tag.name
                        ])
                    )
                ])
                ]),

                showAddExpense && React.createElement('div', {
                    className: 'bg-white p-6 rounded-lg shadow-lg border fade-in'
                }, [
                    React.createElement('h3', {
                        className: 'text-lg font-semibold mb-4'
                    }, 'Add New Expense'),
                    React.createElement('div', {
                        className: 'grid grid-cols-1 md:grid-cols-2 gap-4'
                    }, [
                        React.createElement('input', {
                            type: 'text',
                            value: newExpense.title,
                            onChange: (e) => setNewExpense({...newExpense, title: e.target.value}),
                            className: 'px-4 py-2 border border-gray-300 rounded-lg',
                            placeholder: 'Expense Title'
                        }),
                        React.createElement('input', {
                            type: 'number',
                            value: newExpense.amount,
                            onChange: (e) => setNewExpense({...newExpense, amount: e.target.value}),
                            className: 'px-4 py-2 border border-gray-300 rounded-lg',
                            placeholder: 'Amount'
                        }),
                        React.createElement('input', {
                            type: 'date',
                            value: newExpense.date,
                            onChange: (e) => setNewExpense({...newExpense, date: e.target.value}),
                            className: 'px-4 py-2 border border-gray-300 rounded-lg'
                        }),
                        React.createElement('div', {
                            className: 'file-upload-area rounded-lg p-4 text-center cursor-pointer'
                        }, [
                            React.createElement('input', {
                                type: 'file',
                                accept: 'image/*,application/pdf',
                                onChange: handleFileUpload,
                                className: 'hidden',
                                id: 'receipt-upload'
                            }),
                            React.createElement('label', {
                                htmlFor: 'receipt-upload',
                                className: 'cursor-pointer'
                            }, 
                            newExpense.receipt ? 
                                React.createElement('div', {
                                    className: 'text-green-600'
                                }, [
                                    React.createElement('i', {
                                        className: 'fas fa-check-circle mr-2'
                                    }),
                                    newExpense.receipt.name
                                ]) : 
                                React.createElement('div', {
                                    className: 'text-gray-500'
                                }, [
                                    React.createElement('i', {
                                        className: 'fas fa-cloud-upload-alt mr-2'
                                    }),
                                    'Upload Receipt'
                                ])
                        )
                    ]),
                    React.createElement('textarea', {
                        value: newExpense.description,
                        onChange: (e) => setNewExpense({...newExpense, description: e.target.value}),
                        className: 'w-full px-4 py-2 border border-gray-300 rounded-lg h-24 mt-4',
                        placeholder: 'Description'
                    }),
                    React.createElement('div', {
                        className: 'flex gap-2 mt-4'
                    }, 
                    tags.map(tag => 
                        React.createElement('button', {
                            key: tag.id,
                            type: 'button',
                            onClick: () => setNewExpense({
                                ...newExpense,
                                tags: newExpense.tags.includes(tag.id)
                                    ? newExpense.tags.filter(t => t !== tag.id)
                                    : [...newExpense.tags, tag.id]
                            }),
                            className: `px-3 py-1 rounded-full text-sm font-medium ${
                                newExpense.tags.includes(tag.id) ? 'text-white' : 'text-gray-700'
                            }`,
                            style: {
                                backgroundColor: newExpense.tags.includes(tag.id) ? tag.color : '#f3f4f6'
                            }
                        }, [
                            React.createElement('i', {
                                className: `fas ${tag.icon} mr-1`
                            }),
                            tag.name
                        ])
                    )
                    ]),
                    React.createElement('div', {
                        className: 'flex gap-2 mt-4'
                    }, [
                        React.createElement('button', {
                            onClick: handleAddExpense,
                            className: 'bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700'
                        }, [
                            React.createElement('i', {
                                className: 'fas fa-save mr-2'
                            }),
                            'Save'
                        ]),
                        React.createElement('button', {
                            onClick: () => setShowAddExpense(false),
                            className: 'bg-gray-500 text-white px-4 py-2 rounded-lg hover:bg-gray-600'
                        }, 'Cancel')
                    ])
                ]),

                React.createElement('div', {
                    className: 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6'
                }, 
                filteredExpenses.map(expense => 
                    React.createElement('div', {
                        key: expense.id,
                        className: 'bg-white rounded-lg shadow-lg p-6 card-hover'
                    }, [
                        React.createElement('div', {
                            className: 'flex justify-between items-start mb-4'
                        }, [
                            React.createElement('h3', {
                                className: 'text-lg font-semibold text-gray-800'
                            }, expense.title),
                            React.createElement('span', {
                                className: 'text-xl font-bold text-green-600'
                            }, formatCurrency(expense.amount))
                        ]),
                        React.createElement('p', {
                            className: 'text-gray-600 mb-4'
                        }, expense.description),
                        React.createElement('div', {
                            className: 'flex flex-wrap gap-2 mb-4'
                        }, 
                        expense.tags.map(tagId => {
                            const tag = tags.find(t => t.id === tagId);
                            return tag ? React.createElement('span', {
                                key: tagId,
                                className: 'px-2 py-1 rounded-full text-xs font-medium text-white',
                                style: { backgroundColor: tag.color }
                            }, [
                                React.createElement('i', {
                                    className: `fas ${tag.icon} mr-1`
                                }),
                                tag.name
                            ]) : null;
                        })
                        ),
                        React.createElement('div', {
                            className: 'text-sm text-gray-500 mb-4'
                        }, [
                            React.createElement('p', null, [
                                React.createElement('i', {
                                    className: 'fas fa-user mr-2'
                                }),
                                expense.driverName
                            ]),
                            React.createElement('p', null, [
                                React.createElement('i', {
                                    className: 'fas fa-id-badge mr-2'
                                }),
                                expense.driverId
                            ]),
                            React.createElement('p', null, [
                                React.createElement('i', {
                                    className: 'fas fa-calendar mr-2'
                                }),
                                new Date(expense.date).toLocaleDateString()
                            ]),
                            expense.receipt && React.createElement('p', null, [
                                React.createElement('i', {
                                    className: 'fas fa-receipt mr-2'
                                }),
                                'Receipt attached'
                            ])
                        ]),
                        React.createElement('div', {
                            className: 'flex gap-2'
                        }, [
                            expense.receipt && currentUser.role === 'admin' && React.createElement('button', {
                                onClick: () => viewFile(expense.receipt),
                                className: 'text-blue-600 hover:text-blue-900',
                                title: 'View Receipt'
                            }, [
                                React.createElement('i', {
                                    className: 'fas fa-eye'
                                })
                            ]),
                            (currentUser.role === 'admin' || expense.driverId === currentUser.id) && React.createElement('button', {
                                onClick: () => {
                                    if (confirm('Delete this expense?')) {
                                        const allExpenses = JSON.parse(localStorage.getItem(STORAGE_KEYS.EXPENSES) || '[]');
                                        const filtered = allExpenses.filter(e => e.id !== expense.id);
                                        localStorage.setItem(STORAGE_KEYS.EXPENSES, JSON.stringify(filtered));
                                        loadExpenses();
                                    }
                                },
                                className: 'text-red-600 hover:text-red-900'
                            }, [
                                React.createElement('i', {
                                    className: 'fas fa-trash'
                                })
                            ])
                        ])
                    ])
                )
            ])
        };

        // Reports Component
        const Reports = () => {
            const [expenses, setExpenses] = useState([]);
            const [users, setUsers] = useState([]);
            const [tags, setTags] = useState([]);
            const [dateRange, setDateRange] = useState({
                start: new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0],
                end: new Date().toISOString().split('T')[0]
            });

            useEffect(() => {
                loadExpenses();
                loadUsers();
                loadTags();
            }, []);

            const loadExpenses = () => {
                const allExpenses = JSON.parse(localStorage.getItem(STORAGE_KEYS.EXPENSES) || '[]');
                setExpenses(allExpenses);
            };

            const loadUsers = () => {
                const allUsers = JSON.parse(localStorage.getItem(STORAGE_KEYS.USERS) || '[]');
                setUsers(allUsers);
            };

            const loadTags = () => {
                const allTags = JSON.parse(localStorage.getItem(STORAGE_KEYS.TAGS) || '[]');
                setTags(allTags);
            };

            const filteredExpenses = expenses.filter(expense => {
                const expenseDate = new Date(expense.date);
                const startDate = new Date(dateRange.start);
                const endDate = new Date(dateRange.end);
                return expenseDate >= startDate && expenseDate <= endDate;
            });

            const totalExpenses = filteredExpenses.reduce((sum, exp) => sum + exp.amount, 0);

            const expensesByTag = tags.map(tag => {
                const tagExpenses = filteredExpenses.filter(exp => exp.tags.includes(tag.id));
                const total = tagExpenses.reduce((sum, exp) => sum + exp.amount, 0);
                return {
                    tag,
                    total,
                    count: tagExpenses.length
                };
            }).filter(item => item.count > 0).sort((a, b) => b.total - a.total);

            const expensesByDriver = users.filter(user => user.role === 'driver').map(driver => {
                const driverExpenses = filteredExpenses.filter(exp => exp.driverId === driver.id);
                const total = driverExpenses.reduce((sum, exp) => sum + exp.amount, 0);
                return {
                    driver,
                    total,
                    count: driverExpenses.length
                };
            }).filter(item => item.count > 0).sort((a, b) => b.total - a.total);

            return React.createElement('div', {
                className: 'space-y-6'
            }, [
                React.createElement('div', {
                    className: 'flex justify-between items-center'
                }, [
                    React.createElement('h2', {
                        className: 'text-2xl font-bold text-gray-800'
                    }, 'Expense Reports')
                ]),

                React.createElement('div', {
                    className: 'bg-white p-6 rounded-lg shadow-lg'
                }, [
                    React.createElement('h3', {
                        className: 'text-lg font-semibold mb-4'
                    }, 'Date Range'),
                    React.createElement('div', {
                        className: 'flex gap-4'
                    }, [
                        React.createElement('div', null, [
                            React.createElement('label', {
                                className: 'block text-sm font-medium text-gray-700 mb-2'
                            }, 'Start Date'),
                            React.createElement('input', {
                                type: 'date',
                                value: dateRange.start,
                                onChange: (e) => setDateRange({...dateRange, start: e.target.value}),
                                className: 'px-4 py-2 border border-gray-300 rounded-lg'
                            })
                        ]),
                        React.createElement('div', null, [
                            React.createElement('label', {
                                className: 'block text-sm font-medium text-gray-700 mb-2'
                            }, 'End Date'),
                            React.createElement('input', {
                                type: 'date',
                                value: dateRange.end,
                                onChange: (e) => setDateRange({...dateRange, end: e.target.value}),
                                className: 'px-4 py-2 border border-gray-300 rounded-lg'
                            })
                        ])
                    ])
                ]),

                React.createElement('div', {
                    className: 'grid grid-cols-1 md:grid-cols-3 gap-6'
                }, [
                    React.createElement('div', {
                        className: 'bg-white p-6 rounded-lg shadow-lg'
                    }, [
                        React.createElement('div', {
                            className: 'flex items-center justify-between mb-4'
                        }, [
                            React.createElement('h3', {
                                className: 'text-lg font-semibold text-gray-800'
                            }, 'Total Expenses'),
                            React.createElement('span', {
                                className: 'text-2xl font-bold text-gray-900'
                            }, formatCurrency(totalExpenses))
                        ]),
                        React.createElement('div', {
                            className: 'w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center'
                        }, [
                            React.createElement('i', {
                                className: 'fas fa-dollar-sign text-blue-600'
                            })
                        ])
                    ]),
                    React.createElement('div', {
                        className: 'bg-white p-6 rounded-lg shadow-lg'
                    }, [
                        React.createElement('div', {
                            className: 'flex items-center justify-between mb-4'
                        }, [
                            React.createElement('h3', {
                                className: 'text-lg font-semibold text-gray-800'
                            }, 'Total Claims'),
                            React.createElement('span', {
                                className: 'text-2xl font-bold text-gray-900'
                            }, filteredExpenses.length)
                        ]),
                        React.createElement('div', {
                            className: 'w-12 h-12 bg-green-100 rounded-full flex items-center justify-center'
                        }, [
                            React.createElement('i', {
                                className: 'fas fa-receipt text-green-600'
                            })
                        ])
                    ]),
                    React.createElement('div', {
                        className: 'bg-white p-6 rounded-lg shadow-lg'
                    }, [
                        React.createElement('div', {
                            className: 'flex items-center justify-between mb-4'
                        }, [
                            React.createElement('h3', {
                                className: 'text-lg font-semibold text-gray-800'
                            }, 'Average Expense'),
                            React.createElement('span', {
                                className: 'text-2xl font-bold text-gray-900'
                            }, filteredExpenses.length > 0 ? formatCurrency(totalExpenses / filteredExpenses.length) : '$0')
                        ]),
                        React.createElement('div', {
                            className: 'w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center'
                        }, [
                            React.createElement('i', {
                                className: 'fas fa-chart-line text-purple-600'
                            })
                        ])
                    ])
                ]),

                React.createElement('div', {
                    className: 'grid grid-cols-1 lg:grid-cols-2 gap-6'
                }, [
                    React.createElement('div', {
                        className: 'bg-white p-6 rounded-lg shadow-lg'
                    }, [
                        React.createElement('h3', {
                            className: 'text-lg font-semibold mb-4'
                        }, 'Expenses by Category'),
                        React.createElement('div', {
                            className: 'space-y-3'
                        }, 
                        expensesByTag.map(item => 
                            React.createElement('div', {
                                key: item.tag.id,
                                className: 'flex items-center justify-between'
                            }, [
                                React.createElement('div', {
                                    className: 'flex items-center'
                                }, [
                                    React.createElement('span', {
                                        className: 'w-3 h-3 rounded-full mr-3',
                                        style: { backgroundColor: item.tag.color }
                                    }),
                                    React.createElement('span', {
                                        className: 'text-sm font-medium'
                                    }, [
                                        React.createElement('i', {
                                            className: `fas ${item.tag.icon} mr-2`
                                        }),
                                        item.tag.name
                                    ])
                                ]),
                                React.createElement('div', {
                                    className: 'text-right'
                                }, [
                                    React.createElement('p', {
                                        className: 'text-sm font-semibold'
                                    }, formatCurrency(item.total)),
                                    React.createElement('p', {
                                        className: 'text-xs text-gray-500'
                                    }, `${item.count} claims`)
                                ])
                            ])
                        )
                    ])
                    ]),
                    React.createElement('div', {
                        className: 'bg-white p-6 rounded-lg shadow-lg'
                    }, [
                        React.createElement('h3', {
                            className: 'text-lg font-semibold mb-4'
                        }, 'Expenses by Driver'),
                        React.createElement('div', {
                            className: 'space-y-3'
                        }, 
                        expensesByDriver.map(item => 
                            React.createElement('div', {
                                key: item.driver.id,
                                className: 'flex items-center justify-between'
                            }, [
                                React.createElement('div', null, [
                                    React.createElement('span', {
                                        className: 'text-sm font-medium'
                                    }, item.driver.name),
                                    React.createElement('p', {
                                        className: 'text-xs text-gray-500'
                                    }, item.driver.id)
                                ]),
                                React.createElement('div', {
                                    className: 'text-right'
                                }, [
                                    React.createElement('p', {
                                        className: 'text-sm font-semibold'
                                    }, formatCurrency(item.total)),
                                    React.createElement('p', {
                                        className: 'text-xs text-gray-500'
                                    }, `${item.count} claims`)
                                ])
                            ])
                        )
                    ])
                    ])
                ])
            ])
        };

        // Dashboard Component
        const Dashboard = () => {
            const [activeTab, setActiveTab] = useState('expenses');

            const authContext = useContext(AuthContext);
            const currentUser = authContext?.currentUser;

            const logout = () => {
                authContext?.logout();
            };

            const isAdmin = currentUser?.role === 'admin';

            return React.createElement('div', {
                className: 'min-h-screen bg-gray-50'
            }, [
                React.createElement('header', {
                    className: 'bg-white shadow-sm border-b'
                }, [
                    React.createElement('div', {
                        className: 'max-w-7xl mx-auto px-4 sm:px-6 lg:px-8'
                    }, [
                        React.createElement('div', {
                            className: 'flex justify-between items-center py-4'
                        }, [
                            React.createElement('div', {
                                className: 'flex items-center'
                            }, [
                                React.createElement('div', {
                                    className: 'w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center mr-3'
                                }, [
                                    React.createElement('i', {
                                        className: 'fas fa-truck text-white'
                                    })
                                ]),
                                React.createElement('div', null, [
                                    React.createElement('h1', {
                                        className: 'text-2xl font-bold text-gray-800'
                                    }, 'Expense Management System'),
                                    React.createElement('p', {
                                        className: 'text-sm text-gray-600'
                                    }, `Welcome, ${currentUser.name} (${currentUser.role})`)
                                ])
                            ]),
                            React.createElement('button', {
                                onClick: logout,
                                className: 'bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700 transition'
                            }, [
                                React.createElement('i', {
                                    className: 'fas fa-sign-out-alt mr-2'
                                }),
                                'Logout'
                            ])
                        ])
                    ])
                ]),

                React.createElement('nav', {
                    className: 'bg-white border-b'
                }, [
                    React.createElement('div', {
                        className: 'max-w-7xl mx-auto px-4 sm:px-6 lg:px-8'
                    }, [
                        React.createElement('div', {
                            className: 'flex space-x-8'
                        }, [
                            React.createElement('button', {
                                onClick: () => setActiveTab('expenses'),
                                className: `py-4 px-1 border-b-2 font-medium text-sm ${
                                    activeTab === 'expenses'
                                        ? 'border-blue-500 text-blue-600'
                                        : 'border-transparent text-gray-500 hover:text-gray-700'
                                }`
                            }, [
                                React.createElement('i', {
                                    className: 'fas fa-dollar-sign mr-2'
                                }),
                                'Expenses'
                            ]),
                            isAdmin && React.createElement('button', {
                                onClick: () => setActiveTab('users'),
                                className: `py-4 px-1 border-b-2 font-medium text-sm ${
                                    activeTab === 'users'
                                        ? 'border-blue-500 text-blue-600'
                                        : 'border-transparent text-gray-500 hover:text-gray-700'
                                }`
                            }, [
                                React.createElement('i', {
                                    className: 'fas fa-users mr-2'
                                }),
                                'Driver Management'
                            ]),
                            isAdmin && React.createElement('button', {
                                onClick: () => setActiveTab('reports'),
                                className: `py-4 px-1 border-b-2 font-medium text-sm ${
                                    activeTab === 'reports'
                                        ? 'border-blue-500 text-blue-600'
                                        : 'border-transparent text-gray-500 hover:text-gray-700'
                                }`
                            }, [
                                React.createElement('i', {
                                    className: 'fas fa-chart-bar mr-2'
                                }),
                                'Reports'
                            ])
                        ])
                    ])
                ]),

                React.createElement('main', {
                    className: 'max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8'
                }, [
                    activeTab === 'expenses' && React.createElement(ExpenseManagement),
                    activeTab === 'users' && isAdmin && React.createElement(UserManagement),
                    activeTab === 'reports' && isAdmin && React.createElement(Reports)
                ])
            ])
        };

        // Main App Component
        const App = () => {
            const [currentUser, setCurrentUser] = useState(null);

            useEffect(() => {
                initializeData();
                // Check for existing session
                const savedUser = localStorage.getItem(STORAGE_KEYS.CURRENT_USER);
                if (savedUser) {
                    setCurrentUser(JSON.parse(savedUser));
                }
            }, []);

            const logout = () => {
                setCurrentUser(null);
                localStorage.removeItem(STORAGE_KEYS.CURRENT_USER);
            };

            if (!currentUser) {
                return React.createElement(Login);
            }

            return React.createElement(AuthContext.Provider, {
                value: { currentUser, logout }
            }, React.createElement(Dashboard));
        };

        // Initialize and render app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
