<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FleetTracker</title>
    <!-- Tailwind + Font Awesome + jspdf -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        #app { width: 100%; max-width: 1440px; margin: 0 auto; }
        .dashboard-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(8px);
            border-radius: 2.5rem;
            box-shadow: 0 30px 60px -10px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255,255,255,0.1) inset;
            overflow: hidden;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(8px);
            border-radius: 2.5rem;
            box-shadow: 0 30px 60px -10px rgba(0, 0, 0, 0.3);
            padding: 3rem;
            width: 100%;
            max-width: 480px;
        }
        .tab-btn {
            position: relative;
            font-weight: 600;
            padding: 1rem 2rem;
            color: #64748b;
            transition: all 0.2s;
            cursor: pointer;
            border-bottom: 3px solid transparent;
        }
        .tab-btn.active { color: #10b981; border-bottom-color: #10b981; background: linear-gradient(to top, #ecfdf5, transparent); }
        input, select, textarea {
            border: 2px solid #e2e8f0 !important;
            border-radius: 1rem !important;
            padding: 0.875rem 1.25rem !important;
            font-size: 1rem !important;
            transition: all 0.15s !important;
            background: white !important;
            color: #0f172a !important;
            width: 100%;
        }
        input:focus, select:focus, textarea:focus { border-color: #10b981 !important; outline: none !important; box-shadow: 0 0 0 4px rgba(16,185,129,0.15) !important; }
        label { display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #334155; margin-bottom: 0.5rem; }
        .btn-primary {
            background: #10b981; color: white; font-weight: 700; padding: 0.875rem 2rem; border-radius: 3rem;
            transition: all 0.2s; box-shadow: 0 10px 15px -3px rgba(16,185,129,0.3); border: none; cursor: pointer;
            display: inline-flex; align-items: center; gap: 0.5rem;
        }
        .btn-primary:hover { background: #059669; transform: translateY(-2px); box-shadow: 0 20px 25px -5px rgba(16,185,129,0.4); }
        .btn-secondary {
            background: #f1f5f9; color: #1e293b; font-weight: 600; padding: 0.875rem 2rem; border-radius: 3rem;
            transition: all 0.2s; border: 2px solid #cbd5e1; cursor: pointer;
        }
        .btn-secondary:hover { background: #e2e8f0; border-color: #94a3b8; }
        .btn-danger { background: #ef4444; color: white; font-weight: 600; padding: 0.75rem 1.5rem; border-radius: 2rem; transition: all 0.2s; border: none; cursor: pointer; }
        .btn-danger:hover { background: #dc2626; }
        .expense-card {
            background: white; border-radius: 2rem; padding: 1.75rem; box-shadow: 0 8px 20px -6px rgba(0,0,0,0.1);
            transition: all 0.25s; border: 1px solid #f1f5f9; position: relative; overflow: hidden;
            cursor: pointer;
        }
        .expense-card:hover { transform: translateY(-6px); box-shadow: 0 25px 30px -12px rgba(16,185,129,0.25); border-color: #10b981; }
        .expense-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #10b981, #059669); }
        .tag-chip { display: inline-block; padding: 0.35rem 1rem; border-radius: 100px; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.02em; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .filter-tag { padding: 0.6rem 1.5rem; border-radius: 100px; font-weight: 600; background: white; border: 2px solid #e2e8f0; color: #1e293b; cursor: pointer; transition: all 0.2s; }
        .filter-tag.active { background: #10b981; border-color: #10b981; color: white; }
        .file-drop { border: 2px dashed #cbd5e1; border-radius: 1.5rem; background: #f8fafc; padding: 2rem; text-align: center; transition: all 0.2s; cursor: pointer; }
        .file-drop:hover { border-color: #10b981; background: #f0fdf4; }
        .grid-card { background: white; border-radius: 1.5rem; padding: 1.5rem; box-shadow: 0 6px 14px rgba(0,0,0,0.04); border: 1px solid #eef2f6; transition: 0.2s; }
        .grid-card:hover { border-color: #10b981; }
        .total-badge {
            background: linear-gradient(145deg, #10b981, #047857); color: white; border-radius: 2rem;
            padding: 1.5rem 2.5rem; font-size: 2rem; font-weight: 800; letter-spacing: -0.02em;
            box-shadow: 0 15px 30px -10px #10b981; text-align: center; margin-bottom: 2rem;
        }
        .hidden { display: none !important; }
        .modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content {
            background: white; border-radius: 2rem; padding: 2rem; max-width: 800px; width: 90%;
            max-height: 90vh; overflow-y: auto; box-shadow: 0 30px 60px -10px rgba(0,0,0,0.3);
        }
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }
        .summary-item {
            padding: 0.75rem;
            background: #f8fafc;
            border-radius: 1rem;
            border: 1px solid #e2e8f0;
        }
        .summary-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #64748b;
            margin-bottom: 0.25rem;
        }
        .summary-value {
            font-size: 1rem;
            font-weight: 600;
            color: #0f172a;
            word-break: break-word;
        }
        .preview-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        .preview-table th { background: #10b981; color: white; padding: 0.5rem; position: sticky; top: 0; white-space: nowrap; }
        .preview-table td { padding: 0.5rem; border-bottom: 1px solid #e2e8f0; }
        .preview-table tr:hover { background: #f0fdf4; }
        .delete-btn-on-card {
            position: relative;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script>
        (function() {
            // ---------- STATE ----------
            let currentUser = null;
            let expenses = [];
            let users = [];
            // ----- FIXED 7 TAGS (exactly as specified) -----
            const tags = [
                { id: 'rc', name: 'RC', color: '#dc3545', icon: 'fa-file-contract' },
                { id: 'bol', name: 'BOL', color: '#fd7e14', icon: 'fa-file-invoice' },
                { id: 'pod', name: 'POD', color: '#28a745', icon: 'fa-file-signature' },
                { id: 'dispatcher', name: 'Dispatcher', color: '#17a2b8', icon: 'fa-headset' },
                { id: 'fuel', name: 'Fuel', color: '#6f42c1', icon: 'fa-gas-pump' },
                { id: 'invoice', name: 'Invoice', color: '#e83e8c', icon: 'fa-file-invoice-dollar' },
                { id: 'rlp', name: 'RLP', color: '#6610f2', icon: 'fa-file-alt' }
            ];
            let selectedFilterTags = [];
            let uploadedFile = null;
            let editingUserId = null;

            // ---------- LOAD USERS / EXPENSES FROM STORAGE ----------
            function loadFromStorage() {
                users = JSON.parse(localStorage.getItem('tdems_users')) || [];
                expenses = JSON.parse(localStorage.getItem('tdems_expenses')) || [];
                // ensure default admin
                if (!users.length) {
                    users.push({ id: 'admin-001', username: 'admin', password: 'admin123', role: 'admin', name: 'Fleet Manager' });
                    localStorage.setItem('tdems_users', JSON.stringify(users));
                }
            }
            loadFromStorage();

            // ---------- DOCUMENT FIELDS (only the 7 types, exactly as spec) ----------
            const documentTypeFields = {
                rc: [
                    { id: 'load_number', label: 'Load Number', type: 'text' },
                    { id: 'dispatcher', label: 'Dispatcher', type: 'text' },
                    { id: 'broker_shipper', label: 'Broker/Shipper', type: 'text' },
                    { id: 'pickup_address', label: 'Pickup Address', type: 'text' },
                    { id: 'pickup_datetime', label: 'Pickup Date/Time', type: 'datetime-local' },
                    { id: 'dropoff_address', label: 'Dropoff Address', type: 'text' },
                    { id: 'dropoff_datetime', label: 'Dropoff Date/Time', type: 'datetime-local' },
                    { id: 'miles', label: 'Miles', type: 'number' },
                    { id: 'dh_miles', label: 'DH Miles', type: 'number' },
                    { id: 'total_miles', label: 'Total Miles', type: 'number' },
                    { id: 'rate_per_mile', label: 'Rate/Mile', type: 'number' },
                    { id: 'amount', label: 'Amount $', type: 'number' },
                    { id: 'document_name', label: 'Document Name', type: 'text' }
                ],
                bol: [
                    { id: 'bol_number', label: 'BOL #', type: 'text' },
                    { id: 'rc_number', label: 'RC Number/Load Number', type: 'text' },
                    { id: 'load_number', label: 'Load Number', type: 'text' },
                    { id: 'dispatcher', label: 'Dispatcher', type: 'text' },
                    { id: 'broker_shipper', label: 'Broker/Shipper', type: 'text' },
                    { id: 'pickup_address', label: 'Pickup Address', type: 'text' },
                    { id: 'pickup_datetime', label: 'Pickup Date/Time', type: 'datetime-local' },
                    { id: 'dropoff_address', label: 'Dropoff Address', type: 'text' },
                    { id: 'dropoff_datetime', label: 'Dropoff Date/Time', type: 'datetime-local' },
                    { id: 'miles', label: 'Miles', type: 'number' },
                    { id: 'dh_miles', label: 'DH Miles', type: 'number' },
                    { id: 'document_name', label: 'Document Name', type: 'text' }
                ],
                pod: [
                    { id: 'rc_number', label: 'RC Number/Load Number', type: 'text' },
                    { id: 'load_number', label: 'Load Number', type: 'text' },
                    { id: 'dispatcher', label: 'Dispatcher', type: 'text' },
                    { id: 'broker_shipper', label: 'Broker/Shipper', type: 'text' },
                    { id: 'pickup_address', label: 'Pickup Address', type: 'text' },
                    { id: 'pickup_datetime', label: 'Pickup Date/Time', type: 'datetime-local' },
                    { id: 'dropoff_address', label: 'Dropoff Address', type: 'text' },
                    { id: 'dropoff_datetime', label: 'Dropoff Date/Time', type: 'datetime-local' },
                    { id: 'miles', label: 'Miles', type: 'number' },
                    { id: 'document_name', label: 'Document Name', type: 'text' }
                ],
                dispatcher: [
                    { id: 'dispatcher_company', label: 'Dispatcher/Company', type: 'text' },
                    { id: 'phone_number', label: 'Phone Number', type: 'tel' },
                    { id: 'email', label: 'Email', type: 'email' },
                    { id: 'rc_number', label: 'RC Number', type: 'text' },
                    { id: 'load_number', label: 'Load Number', type: 'text' },
                    { id: 'broker_shipper', label: 'Broker/Shipper', type: 'text' },
                    { id: 'pickup_address', label: 'Pickup Address', type: 'text' },
                    { id: 'pickup_datetime', label: 'Pickup Date/Time', type: 'datetime-local' },
                    { id: 'dropoff_address', label: 'Dropoff Address', type: 'text' },
                    { id: 'dropoff_datetime', label: 'Dropoff Date/Time', type: 'datetime-local' },
                    { id: 'rc_amount', label: 'RC Amount $', type: 'number' },
                    { id: 'dispatcher_percentage', label: 'Dispatcher %', type: 'number' },
                    { id: 'dispatcher_amount', label: 'Dispatcher Amount', type: 'number' }
                ],
                fuel: [
                    { id: 'receipt_number', label: 'Receipt #', type: 'text' },
                    { id: 'receipt_date', label: 'Receipt Date', type: 'date' },
                    { id: 'amount', label: 'Amount', type: 'number' },
                    { id: 'rc_number', label: 'RC Number', type: 'text' },
                    { id: 'load_number', label: 'Load Number', type: 'text' },
                    { id: 'pickup_address', label: 'Pickup Address', type: 'text' },
                    { id: 'pickup_datetime', label: 'Pickup Date/Time', type: 'datetime-local' },
                    { id: 'dropoff_address', label: 'Dropoff Address', type: 'text' },
                    { id: 'dropoff_datetime', label: 'Dropoff Date/Time', type: 'datetime-local' },
                    { id: 'rc_amount', label: 'RC Amount $', type: 'number' }
                ],
                invoice: [
                    { id: 'invoice_number', label: 'Invoice #', type: 'text' },
                    { id: 'rc_number', label: 'RC Number/Load Number', type: 'text' },
                    { id: 'load_number', label: 'Load Number', type: 'text' },
                    { id: 'dispatcher', label: 'Dispatcher', type: 'text' },
                    { id: 'broker_shipper', label: 'Broker/Shipper', type: 'text' },
                    { id: 'pickup_address', label: 'Pickup', type: 'text' },
                    { id: 'dropoff_address', label: 'Dropoff', type: 'text' },
                    { id: 'miles', label: 'Miles', type: 'number' },
                    { id: 'dh_miles', label: 'DH Miles', type: 'number' },
                    { id: 'total_miles', label: 'Total Miles', type: 'number' },
                    { id: 'amount', label: 'Amount RC $', type: 'number' },
                    { id: 'quickpay_percentage', label: 'Quick Pay %', type: 'number' },
                    { id: 'amount_received', label: 'Amount Received $', type: 'number' }
                ],
                rlp: [
                    { id: 'rlp_number', label: 'RLP #', type: 'text' },
                    { id: 'date_received', label: 'Date Received', type: 'date' },
                    { id: 'invoice_number', label: 'Invoice #', type: 'text' },
                    { id: 'rc_number', label: 'RC Number/Load Number', type: 'text' },
                    { id: 'load_number', label: 'Load Number', type: 'text' },
                    { id: 'dispatcher', label: 'Dispatcher', type: 'text' },
                    { id: 'broker_shipper', label: 'Broker/Shipper', type: 'text' },
                    { id: 'total_miles', label: 'Total Miles', type: 'number' },
                    { id: 'amount', label: 'Amount RC $', type: 'number' },
                    { id: 'quickpay_percentage', label: 'Quick Pay %', type: 'number' },
                    { id: 'amount_received', label: 'Amount Received $', type: 'number' }
                ]
            };

            // ---------- HELPERS ----------
            function saveUsers() { localStorage.setItem('tdems_users', JSON.stringify(users)); }
            function saveExpenses() { 
                localStorage.setItem('tdems_expenses', JSON.stringify(expenses));
                console.log('Expenses saved:', expenses.length); // Debug log
            }

            // ---------- AUTH ----------
            function checkAuth() {
                const saved = localStorage.getItem('tdems_current_user');
                if (saved) { currentUser = JSON.parse(saved); showDashboard(); } else showLogin();
            }

            function showLogin() {
                document.getElementById('app').innerHTML = `
                    <div class="flex items-center justify-center min-h-[80vh]">
                        <div class="login-card text-center">
                            <div class="text-6xl text-primary mb-6 pulse-animation"><i class="fas fa-truck"></i></div>
                            <h2 class="text-4xl font-black text-black mb-2">Expense Tracker</h2>
                            <p class="text-gray-500 mb-10">7 Document Types (RC, BOL, POD, Dispatcher, Fuel, Invoice, RLP)</p>
                            <div><div class="mb-6 text-left"><label>Username</label><input type="text" id="loginUsername" value="admin"></div>
                            <div class="mb-8 text-left"><label>Password</label><input type="password" id="loginPassword" value="admin123"></div>
                            <div id="loginError" class="hidden bg-red-500 text-white p-4 rounded-2xl mb-6"></div>
                            <button class="btn-primary w-full justify-center text-lg" onclick="handleLogin()"><i class="fas fa-sign-in-alt mr-2"></i>Sign In</button></div>
                            <div class="mt-8 text-sm text-gray-400">admin / admin123</div>
                        </div>
                    </div>
                `;
            }

            window.handleLogin = function() {
                const username = document.getElementById('loginUsername').value;
                const password = document.getElementById('loginPassword').value;
                const user = users.find(u => u.username === username && u.password === password);
                if (user) {
                    localStorage.setItem('tdems_current_user', JSON.stringify(user));
                    currentUser = user;
                    showDashboard();
                } else {
                    const err = document.getElementById('loginError');
                    err.textContent = 'Invalid credentials';
                    err.classList.remove('hidden');
                }
            };

            window.logout = function() {
                localStorage.removeItem('tdems_current_user');
                currentUser = null;
                showLogin();
            };

            // ---------- DASHBOARD ----------
            async function showDashboard() {
                loadFromStorage();
                const isAdmin = currentUser?.role === 'admin';
                const app = document.getElementById('app');
                app.innerHTML = `
                    <div class="dashboard-card">
                        <div class="flex justify-between items-center px-10 py-6 border-b border-gray-200 bg-white/90">
                            <h1 class="text-3xl font-black text-black tracking-tight">Truck DMS</h1>
                            <div class="flex items-center gap-6">
                                <span class="text-gray-600 font-medium">${currentUser.name} (${currentUser.role})</span>
                                ${isAdmin ? `
                                    <div class="flex gap-2">
                                        <select id="pdfTagSelect" class="py-2 px-3 rounded-full border-2 border-gray-200">
                                            <option value="">All Types (mixed fields)</option>
                                            ${tags.map(t => `<option value="${t.id}">${t.name} (all fields)</option>`).join('')}
                                        </select>
                                        <button class="btn-primary text-sm py-2 px-5" onclick="previewPDF()">
                                            <i class="fas fa-eye mr-2"></i>Preview PDF
                                        </button>
                                        <button class="btn-primary text-sm py-2 px-5" onclick="handleExportPDF()">
                                            <i class="fas fa-file-pdf mr-2"></i>Export PDF
                                        </button>
                                    </div>
                                ` : ''}
                                <button class="btn-danger text-sm py-2 px-5" onclick="logout()">Logout</button>
                            </div>
                        </div>
                        ${isAdmin ? `
                        <div class="flex gap-1 px-10 pt-4 bg-gray-50/80">
                            <div class="tab-btn active" onclick="showTab('expenses')">Expenses</div>
                            <div class="tab-btn" onclick="showTab('users')">User Management</div>
                        </div>
                        ` : ''}
                        <div class="p-10 bg-white/95">
                            <div class="total-badge" id="totalDisplay">Total: $0.00</div>
                            <div class="flex flex-wrap items-center gap-4 mb-8">
                                <input type="text" id="searchInput" placeholder="Search expenses, driver..." class="flex-1 min-w-[240px]" onkeyup="renderExpenses()">
                                <button class="btn-primary" onclick="showExpenseForm()"><i class="fas fa-plus"></i> Add Expense</button>
                            </div>
                            <div class="flex flex-wrap gap-3 mb-10" id="filterTags"></div>

                            <!-- expenses tab (main) -->
                            <div id="expensesTab" class="tab-content block">
                                <div id="expenseForm" class="hidden bg-gray-50 p-8 rounded-3xl border border-gray-200 mb-10">
                                    <h3 class="text-2xl font-bold text-black mb-6">➕ Add Expense (choose document type)</h3>
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div><label>Title *</label><input type="text" id="expenseTitle" placeholder="e.g. Trip 101"></div>
                                        <div><label>Amount ($) *</label><input type="number" id="expenseAmount" placeholder="0.00"></div>
                                        ${isAdmin ? `<div><label>Driver</label><select id="expenseDriver"><option value="">Select driver</option></select></div>` : ''}
                                        <div><label>Document Type *</label><select id="documentType" onchange="renderDocumentFields()"><option value="">Select document type</option></select></div>
                                    </div>
                                    <div class="mt-6"><label>Description</label><textarea id="expenseDescription" rows="3"></textarea></div>
                                    <div id="documentFieldsContainer" class="mt-6"></div>
                                    <div class="mt-6">
                                        <label>Receipt / file</label>
                                        <div class="file-drop" id="fileUpload" onclick="document.getElementById('expenseFile').click()">
                                            <i class="fas fa-cloud-upload-alt text-4xl text-gray-400 mb-3"></i>
                                            <p class="text-gray-500">Click or drag to upload</p>
                                            <div class="text-sm text-gray-400 mt-2" id="fileInfo"></div>
                                        </div>
                                        <input type="file" id="expenseFile" class="hidden" onchange="handleFileSelect(event)">
                                    </div>
                                    <div class="flex gap-4 mt-8">
                                        <button class="btn-primary" onclick="saveExpense()">Save Expense</button>
                                        <button class="btn-secondary" onclick="hideExpenseForm()">Cancel</button>
                                    </div>
                                </div>
                                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6" id="expensesGrid"></div>
                            </div>

                            <!-- users tab (admin only) -->
                            <div id="usersTab" class="tab-content hidden">
                                <div class="bg-gray-50 p-8 rounded-3xl border border-gray-200 mb-10">
                                    <h3 class="text-2xl font-bold mb-6">👤 Add User</h3>
                                    <div class="grid md:grid-cols-2 gap-6">
                                        <div><label>Username</label><input type="text" id="newUsername"></div>
                                        <div><label>Password</label><input type="password" id="newPassword"></div>
                                        <div><label>Full Name</label><input type="text" id="newFullName"></div>
                                        <div><label>Role</label><select id="newRole"><option value="driver">Driver</option><option value="admin">Admin</option></select></div>
                                    </div>
                                    <button class="btn-primary mt-8" onclick="addUser()"><i class="fas fa-user-plus"></i> Add User</button>
                                </div>
                                <div id="editUserForm" class="hidden bg-blue-50 p-8 rounded-3xl border border-blue-200 mb-10">
                                    <h3 class="text-2xl font-bold mb-6">✏️ Edit User</h3>
                                    <div class="grid md:grid-cols-2 gap-6">
                                        <div><label>Username</label><input type="text" id="editUsername"></div>
                                        <div><label>Password (blank = keep)</label><input type="password" id="editPassword"></div>
                                        <div><label>Full Name</label><input type="text" id="editFullName"></div>
                                        <div><label>Role</label><select id="editRole"><option value="driver">Driver</option><option value="admin">Admin</option></select></div>
                                    </div>
                                    <div class="flex gap-4 mt-8">
                                        <button class="btn-primary" onclick="updateUser()">Update</button>
                                        <button class="btn-secondary" onclick="cancelEditUser()">Cancel</button>
                                    </div>
                                </div>
                                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5" id="usersGrid"></div>
                            </div>
                        </div>
                    </div>
                `;
                // Populate document type dropdown from fixed tags
                const typeSel = document.getElementById('documentType');
                if (typeSel) {
                    typeSel.innerHTML = '<option value="">Select document type</option>';
                    tags.forEach(t => typeSel.innerHTML += `<option value="${t.id}">${t.name}</option>`);
                }
                if (isAdmin) {
                    const driverSel = document.getElementById('expenseDriver');
                    if (driverSel) {
                        driverSel.innerHTML = '<option value="">Select driver</option>';
                        users.filter(u => u.role === 'driver').forEach(d => {
                            driverSel.innerHTML += `<option value="${d.id}">${d.name}</option>`;
                        });
                    }

            function fileToBase64(file, cb) { const r = new FileReader(); r.onload = () => cb(r.result); r.readAsDataURL(file); }

            window.saveExpense = function() {
                console.log('saveExpense called'); // Debug log
                
                const title = document.getElementById('expenseTitle')?.value;
                const amount = parseFloat(document.getElementById('expenseAmount')?.value);
                const desc = document.getElementById('expenseDescription')?.value;
                const docType = document.getElementById('documentType')?.value;
                
                console.log('Form values:', { title, amount, desc, docType }); // Debug log
                
                if (!title || !amount || !docType) {
                    alert('Title, amount & document type required');
                    return;
                }
                
                let fieldVals = {};
                if (documentTypeFields[docType]) {
                    documentTypeFields[docType].forEach(f => {
                        const inp = document.getElementById(`field_${f.id}`);
                        if (inp && inp.value) fieldVals[f.id] = inp.value;
                    });
                }
                
                let driverId = currentUser.id, driverName = currentUser.name, driverUsername = currentUser.username;
                if (currentUser.role === 'admin') {
                    const ds = document.getElementById('expenseDriver');
                    if (ds && ds.value) {
                        const d = users.find(u => u.id === ds.value);
                        if (d) { driverId = d.id; driverName = d.name; driverUsername = d.username; }
                    }
                }
                
                const newExp = {
                    id: 'exp-' + Date.now(),
                    title: title,
                    amount: amount,
                    description: desc || '',
                    document_type: docType,
                    driver_id: driverId,
                    driver_name: driverName,
                    driver_username: driverUsername,
                    created_at: new Date().toISOString(),
                    ...fieldVals
                };
                
                console.log('New expense object:', newExp); // Debug log
                
                if (uploadedFile) {
                    fileToBase64(uploadedFile, (b64) => {
                        newExp.receipt_url = { name: uploadedFile.name, type: uploadedFile.type, data: b64 };
                        expenses.push(newExp);
                        saveExpenses();
                        hideExpenseForm();
                        renderExpenses();
                        alert('Expense saved successfully!');
                    });
                } else {
                    expenses.push(newExp);
                    saveExpenses();
                    hideExpenseForm();
                    renderExpenses();
                    alert('Expense saved successfully!');
                }
            };

            function renderFilterTags() {

                tags.forEach(t => {
                    const btn = document.createElement('button');
                    btn.className = `filter-tag ${selectedFilterTags.includes(t.id) ? 'active' : ''}`;
                    btn.style.backgroundColor = selectedFilterTags.includes(t.id) ? t.color : '';
                    btn.style.borderColor = selectedFilterTags.includes(t.id) ? t.color : '#e2e8f0';
                    btn.textContent = t.name;

                        const idx = selectedFilterTags.indexOf(t.id);
                        idx === -1 ? selectedFilterTags.push(t.id) : selectedFilterTags.splice(idx, 1);

                        renderExpenses();

            window.renderExpenses = function() {
                const grid = document.getElementById('expensesGrid');
                if (!grid) return;
                
                console.log('Rendering expenses, count:', expenses.length); // Debug log
                
                const search = document.getElementById('searchInput')?.value.toLowerCase() || '';

                    (e.title?.toLowerCase().includes(search) || 
                     (e.description && e.description.toLowerCase().includes(search)) || 
                     e.driver_name?.toLowerCase().includes(search)) &&
                    (currentUser.role === 'admin' || e.driver_id === currentUser.id)
                );
                
                if (selectedFilterTags.length) {
                    filtered = filtered.filter(e => selectedFilterTags.includes(e.document_type));
                }
                
                const total = filtered.reduce((s,e) => s + (parseFloat(e.amount) || 0), 0);

            // ---------- PDF EXPORT WITH ALL FIELDS (EXACTLY AS SPECIFIED) ----------
            function getFilteredExpensesForPDF() {
                const tagSelect = document.getElementById('pdfTagSelect');
                const selectedTag = tagSelect ? tagSelect.value : '';
                let filtered = [...expenses];
                if (selectedTag) {
                    filtered = filtered.filter(e => e.document_type === selectedTag);
                }
                return filtered;
            }

            // Get ALL field labels for a document type (exactly as specified in the template)
            function getAllFieldLabelsForType(type) {
                if (!type || type === '') {
                    // For mixed types, show basic fields
                    return ['Date', 'Title', 'Driver', 'Amount', 'Type'];
                }
                
                const fieldMap = {
                    rc: ['Date', 'Load Number', 'Dispatcher', 'Broker/Shipper', 'Pickup Address', 'Pickup Date/Time', 'Dropoff Address', 'Dropoff Date/Time', 'Miles', 'DH Miles', 'Total Miles', 'Rate/Mile', 'Amount $', 'Document Name'],
                    bol: ['Date', 'BOL #', 'RC Number/Load Number', 'Load Number', 'Dispatcher', 'Broker/Shipper', 'Pickup Address', 'Pickup Date/Time', 'Dropoff Address', 'Dropoff Date/Time', 'Miles', 'DH Miles', 'Document Name'],
                    pod: ['Date', 'RC Number/Load Number', 'Load Number', 'Dispatcher', 'Broker/Shipper', 'Pickup Address', 'Pickup Date/Time', 'Dropoff Address', 'Dropoff Date/Time', 'Miles', 'Document Name'],
                    dispatcher: ['Date', 'Dispatcher/Company', 'Phone Number', 'Email', 'RC Number', 'Load Number', 'Broker/Shipper', 'Pickup Address', 'Pickup Date/Time', 'Dropoff Address', 'Dropoff Date/Time', 'RC Amount $', 'Dispatcher %', 'Dispatcher Amount'],
                    fuel: ['Date', 'Receipt #', 'Receipt Date', 'Amount', 'RC Number', 'Load Number', 'Pickup Address', 'Pickup Date/Time', 'Dropoff Address', 'Dropoff Date/Time', 'RC Amount $'],
                    invoice: ['Date', 'Invoice #', 'RC Number/Load Number', 'Load Number', 'Dispatcher', 'Broker/Shipper', 'Pickup', 'Dropoff', 'Miles', 'DH Miles', 'Total Miles', 'Amount RC $', 'Quick Pay %', 'Amount Received $'],
                    rlp: ['Date', 'RLP #', 'Date Received', 'Invoice #', 'RC Number/Load Number', 'Load Number', 'Dispatcher', 'Broker/Shipper', 'Total Miles', 'Amount RC $', 'Quick Pay %', 'Amount Received $']
                };
                return fieldMap[type] || ['Date', 'Title', 'Driver', 'Amount'];
            }

            // Get ALL field values for an expense (exactly as specified)
            function getAllFieldValuesForExpense(exp) {
                const type = exp.document_type;
                const date = new Date(exp.created_at).toLocaleDateString();
                
                // For mixed types, return basic fields
                if (!type) {
                    return [date, exp.title || '', exp.driver_name || '', `$${parseFloat(exp.amount || 0).toFixed(2)}`, ''];
                }
                
                // Format values for display
                const formatValue = (val) => {
                    if (val === null || val === undefined || val === '') return '';
                    if (typeof val === 'number') return val.toString();
                    return val;
                };
                
                if (type === 'rc') {
                    return [date, 
                            formatValue(exp.load_number), 
                            formatValue(exp.dispatcher), 
                            formatValue(exp.broker_shipper), 
                            formatValue(exp.pickup_address), 
                            formatValue(exp.pickup_datetime), 
                            formatValue(exp.dropoff_address), 
                            formatValue(exp.dropoff_datetime), 
                            formatValue(exp.miles), 
                            formatValue(exp.dh_miles), 
                            formatValue(exp.total_miles), 
                            formatValue(exp.rate_per_mile), 
                            `$${parseFloat(exp.amount || 0).toFixed(2)}`, 
                            formatValue(exp.document_name)];
                }
                if (type === 'bol') {
                    return [date, 
                            formatValue(exp.bol_number), 
                            formatValue(exp.rc_number), 
                            formatValue(exp.load_number), 
                            formatValue(exp.dispatcher), 
                            formatValue(exp.broker_shipper), 
                            formatValue(exp.pickup_address), 
                            formatValue(exp.pickup_datetime), 
                            formatValue(exp.dropoff_address), 
                            formatValue(exp.dropoff_datetime), 
                            formatValue(exp.miles), 
                            formatValue(exp.dh_miles), 
                            formatValue(exp.document_name)];
                }
                if (type === 'pod') {
                    return [date, 
                            formatValue(exp.rc_number), 
                            formatValue(exp.load_number), 
                            formatValue(exp.dispatcher), 
                            formatValue(exp.broker_shipper), 
                            formatValue(exp.pickup_address), 
                            formatValue(exp.pickup_datetime), 
                            formatValue(exp.dropoff_address), 
                            formatValue(exp.dropoff_datetime), 
                            formatValue(exp.miles), 
                            formatValue(exp.document_name)];
                }
                if (type === 'dispatcher') {
                    return [date, 
                            formatValue(exp.dispatcher_company), 
                            formatValue(exp.phone_number), 
                            formatValue(exp.email), 
                            formatValue(exp.rc_number), 
                            formatValue(exp.load_number), 
                            formatValue(exp.broker_shipper), 
                            formatValue(exp.pickup_address), 
                            formatValue(exp.pickup_datetime), 
                            formatValue(exp.dropoff_address), 
                            formatValue(exp.dropoff_datetime), 
                            formatValue(exp.rc_amount), 
                            formatValue(exp.dispatcher_percentage), 
                            formatValue(exp.dispatcher_amount)];
                }
                if (type === 'fuel') {
                    return [date, 
                            formatValue(exp.receipt_number), 
                            formatValue(exp.receipt_date), 
                            `$${parseFloat(exp.amount || 0).toFixed(2)}`, 
                            formatValue(exp.rc_number), 
                            formatValue(exp.load_number), 
                            formatValue(exp.pickup_address), 
                            formatValue(exp.pickup_datetime), 
                            formatValue(exp.dropoff_address), 
                            formatValue(exp.dropoff_datetime), 
                            formatValue(exp.rc_amount)];
                }
                if (type === 'invoice') {
                    return [date, 
                            formatValue(exp.invoice_number), 
                            formatValue(exp.rc_number), 
                            formatValue(exp.load_number), 
                            formatValue(exp.dispatcher), 
                            formatValue(exp.broker_shipper), 
                            formatValue(exp.pickup_address), 
                            formatValue(exp.dropoff_address), 
                            formatValue(exp.miles), 
                            formatValue(exp.dh_miles), 
                            formatValue(exp.total_miles), 
                            `$${parseFloat(exp.amount || 0).toFixed(2)}`, 
                            formatValue(exp.quickpay_percentage), 
                            `$${parseFloat(exp.amount_received || 0).toFixed(2)}`];
                }
                if (type === 'rlp') {
                    return [date, 
                            formatValue(exp.rlp_number), 
                            formatValue(exp.date_received), 
                            formatValue(exp.invoice_number), 
                            formatValue(exp.rc_number), 
                            formatValue(exp.load_number), 
                            formatValue(exp.dispatcher), 
                            formatValue(exp.broker_shipper), 
                            formatValue(exp.total_miles), 
                            `$${parseFloat(exp.amount || 0).toFixed(2)}`, 
                            formatValue(exp.quickpay_percentage), 
                            `$${parseFloat(exp.amount_received || 0).toFixed(2)}`];
                }
                
                return [date, exp.title || '', exp.driver_name || '', `$${parseFloat(exp.amount || 0).toFixed(2)}`, type];
            }

            window.previewPDF = function() {
                const filtered = getFilteredExpensesForPDF();
                const tagSelect = document.getElementById('pdfTagSelect');
                const selectedTag = tagSelect ? tagSelect.value : '';
                
                if (!filtered.length) {
                    alert('No expenses to preview for selected tag');
                    return;
                }

                const headers = getAllFieldLabelsForType(selectedTag);
                const rows = filtered.map(exp => getAllFieldValuesForExpense(exp));

                // Show preview modal
                const modal = document.createElement('div');
                modal.className = 'modal';
                modal.innerHTML = `
                    <div class="modal-content max-w-7xl">
                        <h2 class="text-2xl font-bold mb-4">PDF Preview - ${selectedTag ? tags.find(t => t.id === selectedTag)?.name + ' (All Fields)' : 'All Types (Basic Fields)'}</h2>
                        <p class="mb-4">${filtered.length} expense(s) · Total: $${filtered.reduce((s,e) => s + parseFloat(e.amount || 0), 0).toFixed(2)}</p>
                        <div class="overflow-x-auto max-h-[70vh]">
                            <table class="preview-table">
                                <thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
                                <tbody>
                                    ${rows.map(row => `<tr>${row.map(cell => `<td>${cell}</td>`).join('')}</tr>`).join('')}
                                </tbody>
                            </table>
                        </div>
                        <div class="flex gap-4 mt-6 justify-end">
                            <button class="btn-secondary" onclick="this.closest('.modal').remove()">Close</button>
                            <button class="btn-primary" onclick="this.closest('.modal').remove(); handleExportPDF(true)">Export PDF</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);

            window.handleExportPDF = function(fromPreview = false) {
                if (currentUser?.role !== 'admin') return alert('Admin only');
                const filtered = getFilteredExpensesForPDF();
                const tagSelect = document.getElementById('pdfTagSelect');
                const selectedTag = tagSelect ? tagSelect.value : '';
                
                if (!filtered.length) {
                    alert('No expenses to export for selected tag');
                    return;
                }

                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ orientation: 'landscape' });
                
                const title = selectedTag ? `${tags.find(t => t.id === selectedTag)?.name} Report (All Fields)` : 'Combined Report (Basic Fields)';
                doc.setFontSize(16); doc.setTextColor(16,185,129); doc.text(title, 14, 22);
                doc.setFontSize(9); doc.setTextColor(100,116,139); 
                doc.text(`Generated: ${new Date().toLocaleDateString()} · ${filtered.length} expenses`, 14, 32);
                
                const total = filtered.reduce((s,e) => s + parseFloat(e.amount || 0), 0);
                doc.text(`Total Amount: $${total.toFixed(2)}`, 14, 40);

                const headers = getAllFieldLabelsForType(selectedTag);
                const rows = filtered.map(exp => getAllFieldValuesForExpense(exp));

                doc.autoTable({
                    startY: 45,
                    head: [headers],
                    body: rows,
                    theme: 'grid',
                    headStyles: { fillColor: [16,185,129], textColor: [255,255,255], fontStyle: 'bold', fontSize: 7 },
                    styles: { fontSize: 6, cellPadding: 1.5, overflow: 'linebreak' },
                    margin: { top: 45 },
                    columnStyles: { 0: { cellWidth: 20 } } // date column fixed width
                });

                const filename = selectedTag ? `${selectedTag}_all_fields_${new Date().toISOString().slice(0,10)}.pdf` : `all_types_basic_${new Date().toISOString().slice(0,10)}.pdf`;
                doc.save(filename);
            };

                    <h4 class="font-bold text-lg">${u.name}</h4>

            window.deleteUser = function(id) { if (confirm('Delete user?')) { users = users.filter(u => u.id !== id); saveUsers(); renderUsersGrid(); } };
            window.editUser = function(id) { 
                const u = users.find(x => x.id === id); 
                if (!u) return; 
                editingUserId = id; 
                document.getElementById('editUsername').value = u.username; 
                document.getElementById('editFullName').value = u.name; 
                document.getElementById('editRole').value = u.role; 
                document.getElementById('editUserForm').classList.remove('hidden'); 
            };
            window.cancelEditUser = function() { document.getElementById('editUserForm').classList.add('hidden'); editingUserId = null; };
            window.updateUser = function() {
                const u = users.find(x => x.id === editingUserId); 
                if (!u) return; 
                u.username = document.getElementById('editUsername').value; 
                u.name = document.getElementById('editFullName').value; 
                u.role = document.getElementById('editRole').value; 
                const pw = document.getElementById('editPassword').value; 
                if (pw) u.password = pw; 
                saveUsers(); 
                cancelEditUser(); 
                renderUsersGrid(); 
            };
            window.addUser = function() {
                const username = document.getElementById('newUsername').value;
                const pw = document.getElementById('newPassword').value;
                const name = document.getElementById('newFullName').value;
                const role = document.getElementById('newRole').value;
                if (!username || !pw || !name) return alert('All fields required');
                const newUser = { id: 'user-'+Date.now(), username, password: pw, role, name };
                users.push(newUser);
                saveUsers();
                renderUsersGrid();
                document.getElementById('newUsername').value = ''; document.getElementById('newPassword').value = ''; document.getElementById('newFullName').value = '';
            };

            window.viewFile = function(data) { window.open(data); };

            // start
            document.addEventListener('DOMContentLoaded', checkAuth);
        })();
    </script>
</body>
</html>
