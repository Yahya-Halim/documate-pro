<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truck Driver Expense Tracker</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 400px;
            text-align: center;
        }
        .logo {
            font-size: 48px;
            color: #667eea;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .error {
            background: #fee;
            color: #c53030;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #fecaca;
        }
        .dashboard {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }
        .header h1 {
            color: #333;
            margin: 0;
        }
        .header .user-info {
            color: #666;
            font-size: 14px;
        }
        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
        }
        .expense-form {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-row-full {
            margin-bottom: 20px;
        }
        .form-row-full input,
        .form-row-full textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
        }
        .form-row-full textarea {
            min-height: 100px;
            resize: vertical;
        }
        .tag-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tag-btn {
            padding: 8px 16px;
            border: 2px solid #e1e5e9;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tag-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        .expense-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .expense-card {
            background: white;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            padding: 20px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .expense-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        .expense-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }
        .expense-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin: 0;
        }
        .expense-amount {
            font-size: 20px;
            font-weight: bold;
            color: #28a745;
        }
        .expense-description {
            color: #666;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        .expense-meta {
            font-size: 14px;
            color: #999;
            margin-bottom: 15px;
        }
        .expense-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }
        .expense-tag {
            background: #e9ecef;
            color: #495057;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
        }
        .expense-actions {
            display: flex;
            gap: 10px;
        }
        .action-btn {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .view-btn {
            background: #007bff;
            color: white;
        }
        .delete-btn {
            background: #dc3545;
            color: white;
        }
        .search-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            align-items: center;
        }
        .search-input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
        }
        .add-expense-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        .total-display {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        const { useState, useEffect, createContext, useContext } = React;

        const STORAGE_KEYS = {
            USERS: 'tdems_users',
            EXPENSES: 'tdems_expenses',
            TAGS: 'tdems_tags',
            CURRENT_USER: 'tdems_current_user'
        };

        const DEFAULT_TAGS = [
            { id: 'fuel', name: 'Fuel', color: '#dc3545' },
            { id: 'maintenance', name: 'Maintenance', color: '#fd7e14' },
            { id: 'food', name: 'Food', color: '#28a745' },
            { id: 'lodging', name: 'Lodging', color: '#17a2b8' },
            { id: 'tolls', name: 'Tolls', color: '#6f42c1' },
            { id: 'insurance', name: 'Insurance', color: '#e83e8c' },
            { id: 'supplies', name: 'Supplies', color: '#6610f2' },
            { id: 'other', name: 'Other', color: '#6c757d' }
        ];

        const initializeData = () => {
            const users = JSON.parse(localStorage.getItem(STORAGE_KEYS.USERS) || '[]');
            if (users.length === 0) {
                const defaultAdmin = {
                    id: 'admin-001',
                    username: 'admin',
                    password: 'admin123',
                    role: 'admin',
                    name: 'Fleet Manager',
                    createdAt: new Date().toISOString()
                };
                localStorage.setItem(STORAGE_KEYS.USERS, JSON.stringify([defaultAdmin]));
            }
            const tags = JSON.parse(localStorage.getItem(STORAGE_KEYS.TAGS) || '[]');
            if (tags.length === 0) {
                localStorage.setItem(STORAGE_KEYS.TAGS, JSON.stringify(DEFAULT_TAGS));
            }
        };

        const formatCurrency = (amount) => {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD'
            }).format(amount);
        };

        const AuthContext = createContext();

        const Login = () => {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleSubmit = (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');
                
                const users = JSON.parse(localStorage.getItem(STORAGE_KEYS.USERS) || '[]');
                const user = users.find(u => u.username === username && u.password === password);
                
                if (user) {
                    localStorage.setItem(STORAGE_KEYS.CURRENT_USER, JSON.stringify(user));
                    window.location.reload();
                } else {
                    setError('Invalid username or password');
                }
                setLoading(false);
            };

            return React.createElement('div', { className: 'login-container' }, [
                React.createElement('div', { className: 'login-card' }, [
                    React.createElement('div', { className: 'logo' }, [
                        React.createElement('i', { className: 'fas fa-truck' })
                    ]),
                    React.createElement('h2', null, 'Expense Tracker'),
                    React.createElement('p', null, 'Truck Driver Management'),
                    
                    React.createElement('form', { onSubmit: handleSubmit }, [
                        React.createElement('div', { className: 'form-group' }, [
                            React.createElement('label', null, 'Username'),
                            React.createElement('input', {
                                type: 'text',
                                value: username,
                                onChange: (e) => setUsername(e.target.value),
                                placeholder: 'Enter username',
                                required: true
                            })
                        ]),
                        
                        React.createElement('div', { className: 'form-group' }, [
                            React.createElement('label', null, 'Password'),
                            React.createElement('input', {
                                type: 'password',
                                value: password,
                                onChange: (e) => setPassword(e.target.value),
                                placeholder: 'Enter password',
                                required: true
                            })
                        ]),
                        
                        error && React.createElement('div', { className: 'error' }, error),
                        
                        React.createElement('button', {
                            type: 'submit',
                            disabled: loading,
                            className: 'btn'
                        }, loading ? 'Signing in...' : 'Sign In')
                    ]),
                    
                    React.createElement('div', { style: { marginTop: '20px', fontSize: '14px', color: '#666' } }, 'Default: admin / admin123')
                ])
            ]);
        };

        const Dashboard = () => {
            const [expenses, setExpenses] = useState([]);
            const [showAddExpense, setShowAddExpense] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedTags, setSelectedTags] = useState([]);
            const [tags, setTags] = useState([]);
            const [newExpense, setNewExpense] = useState({
                title: '',
                amount: '',
                date: new Date().toISOString().split('T')[0],
                description: '',
                tags: []
            });

            const authContext = useContext(AuthContext);
            const currentUser = authContext?.currentUser;

            useEffect(() => {
                loadExpenses();
                loadTags();
            }, []);

            const loadExpenses = () => {
                const allExpenses = JSON.parse(localStorage.getItem(STORAGE_KEYS.EXPENSES) || '[]');
                setExpenses(allExpenses);
            };

            const loadTags = () => {
                const allTags = JSON.parse(localStorage.getItem(STORAGE_KEYS.TAGS) || '[]');
                setTags(allTags);
            };

            const handleAddExpense = () => {
                if (!newExpense.title || !newExpense.amount) {
                    alert('Please fill required fields');
                    return;
                }

                const expense = {
                    id: 'exp-' + Date.now(),
                    title: newExpense.title,
                    amount: parseFloat(newExpense.amount),
                    date: newExpense.date,
                    description: newExpense.description,
                    tags: newExpense.tags,
                    driverId: currentUser.id,
                    driverName: currentUser.name,
                    driverUsername: currentUser.username,
                    createdAt: new Date().toISOString()
                };

                const allExpenses = JSON.parse(localStorage.getItem(STORAGE_KEYS.EXPENSES) || '[]');
                allExpenses.push(expense);
                localStorage.setItem(STORAGE_KEYS.EXPENSES, JSON.stringify(allExpenses));
                loadExpenses();
                
                setNewExpense({
                    title: '',
                    amount: '',
                    date: new Date().toISOString().split('T')[0],
                    description: '',
                    tags: []
                });
                setShowAddExpense(false);
            };

            const filteredExpenses = expenses.filter(expense => {
                const matchesSearch = 
                    expense.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    expense.description.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    expense.driverName.toLowerCase().includes(searchTerm.toLowerCase());
                
                const matchesTags = selectedTags.length === 0 || 
                    selectedTags.some(tagId => expense.tags.includes(tagId));
                
                if (currentUser.role === 'driver') {
                    return matchesSearch && matchesTags && expense.driverId === currentUser.id;
                }
                
                return matchesSearch && matchesTags;
            });

            const totalExpenses = filteredExpenses.reduce((sum, exp) => sum + exp.amount, 0);

            const logout = () => {
                localStorage.removeItem(STORAGE_KEYS.CURRENT_USER);
                window.location.reload();
            };

            const isAdmin = currentUser?.role === 'admin';

            return React.createElement('div', { className: 'container' }, [
                React.createElement('div', { className: 'header' }, [
                    React.createElement('h1', null, 'Expense Management System'),
                    React.createElement('div', null, [
                        React.createElement('div', { className: 'user-info' }, 'Welcome, ' + currentUser.name + ' (' + currentUser.role + ')'),
                        React.createElement('button', { onClick: logout, className: 'logout-btn' }, 'Logout')
                    ])
                ]),

                React.createElement('div', { className: 'total-display' }, [
                    'Total Expenses: ' + formatCurrency(totalExpenses)
                ]),

                React.createElement('div', { className: 'search-bar' }, [
                    React.createElement('input', {
                        type: 'text',
                        value: searchTerm,
                        onChange: (e) => setSearchTerm(e.target.value),
                        placeholder: 'Search expenses...',
                        className: 'search-input'
                    }),
                    currentUser.role === 'driver' && React.createElement('button', {
                        onClick: () => setShowAddExpense(true),
                        className: 'add-expense-btn'
                    }, [
                        React.createElement('i', { className: 'fas fa-plus', style: { marginRight: '8px' } }),
                        'Add Expense'
                    ])
                ]),

                React.createElement('div', { className: 'tag-buttons' }, 
                tags.map(tag => 
                    React.createElement('button', {
                        key: tag.id,
                        onClick: () => setSelectedTags(
                            selectedTags.includes(tag.id) 
                                ? selectedTags.filter(t => t !== tag.id)
                                : selectedTags.concat([tag.id])
                        ),
                        className: 'tag-btn ' + (selectedTags.includes(tag.id) ? 'active' : ''),
                        style: { 
                            borderColor: selectedTags.includes(tag.id) ? tag.color : '#e1e5e9',
                            backgroundColor: selectedTags.includes(tag.id) ? tag.color : 'white',
                            color: selectedTags.includes(tag.id) ? 'white' : '#333'
                        }
                    }, tag.name)
                )
                ),

                showAddExpense && React.createElement('div', { className: 'expense-form' }, [
                    React.createElement('h3', null, 'Add New Expense'),
                    React.createElement('div', { className: 'form-row' }, [
                        React.createElement('div', { className: 'form-group' }, [
                            React.createElement('label', null, 'Title'),
                            React.createElement('input', {
                                type: 'text',
                                value: newExpense.title,
                                onChange: (e) => setNewExpense({...newExpense, title: e.target.value}),
                                placeholder: 'Expense Title'
                            })
                        ]),
                        React.createElement('div', { className: 'form-group' }, [
                            React.createElement('label', null, 'Amount'),
                            React.createElement('input', {
                                type: 'number',
                                value: newExpense.amount,
                                onChange: (e) => setNewExpense({...newExpense, amount: e.target.value}),
                                placeholder: 'Amount'
                            })
                        ])
                    ]),
                    React.createElement('div', { className: 'form-row' }, [
                        React.createElement('div', { className: 'form-group' }, [
                            React.createElement('label', null, 'Date'),
                            React.createElement('input', {
                                type: 'date',
                                value: newExpense.date,
                                onChange: (e) => setNewExpense({...newExpense, date: e.target.value})
                            })
                        ]),
                        React.createElement('div', { className: 'form-group' }, [
                            React.createElement('label', null, 'Tags'),
                            React.createElement('div', { className: 'tag-buttons' }, 
                            tags.map(tag => 
                                React.createElement('button', {
                                    key: tag.id,
                                    type: 'button',
                                    onClick: () => setNewExpense({
                                        ...newExpense,
                                        tags: newExpense.tags.includes(tag.id)
                                            ? newExpense.tags.filter(t => t !== tag.id)
                                            : newExpense.tags.concat([tag.id])
                                    }),
                                    className: 'tag-btn ' + (newExpense.tags.includes(tag.id) ? 'active' : ''),
                                    style: { 
                                        borderColor: newExpense.tags.includes(tag.id) ? tag.color : '#e1e5e9',
                                        backgroundColor: newExpense.tags.includes(tag.id) ? tag.color : 'white',
                                        color: newExpense.tags.includes(tag.id) ? 'white' : '#333'
                                    }
                                }, tag.name)
                            )
                            )
                        ])
                    ]),
                    React.createElement('div', { className: 'form-row-full' }, [
                        React.createElement('label', null, 'Description'),
                        React.createElement('textarea', {
                            value: newExpense.description,
                            onChange: (e) => setNewExpense({...newExpense, description: e.target.value}),
                            placeholder: 'Description'
                        })
                    ]),
                    React.createElement('div', { style: { display: 'flex', gap: '10px' } }, [
                        React.createElement('button', {
                            onClick: handleAddExpense,
                            className: 'btn',
                            style: { background: '#28a745' }
                        }, 'Save Expense'),
                        React.createElement('button', {
                            onClick: () => setShowAddExpense(false),
                            className: 'btn',
                            style: { background: '#6c757d' }
                        }, 'Cancel')
                    ])
                ]),

                React.createElement('div', { className: 'expense-grid' }, 
                filteredExpenses.map(expense => 
                    React.createElement('div', { key: expense.id, className: 'expense-card' }, [
                        React.createElement('div', { className: 'expense-header' }, [
                            React.createElement('h3', { className: 'expense-title' }, expense.title),
                            React.createElement('div', { className: 'expense-amount' }, formatCurrency(expense.amount))
                        ]),
                        React.createElement('p', { className: 'expense-description' }, expense.description),
                        React.createElement('div', { className: 'expense-tags' }, 
                        expense.tags.map(tagId => {
                            const tag = tags.find(t => t.id === tagId);
                            return tag ? React.createElement('span', {
                                key: tagId,
                                className: 'expense-tag',
                                style: { backgroundColor: tag.color + '20', color: tag.color }
                            }, tag.name) : null;
                        })
                        ),
                        React.createElement('div', { className: 'expense-meta' }, [
                            'Driver: ' + expense.driverName,
                            React.createElement('br'),
                            'Date: ' + new Date(expense.date).toLocaleDateString()
                        ]),
                        React.createElement('div', { className: 'expense-actions' }, [
                            (currentUser.role === 'admin' || expense.driverId === currentUser.id) && React.createElement('button', {
                                onClick: () => {
                                    if (confirm('Delete this expense?')) {
                                        const allExpenses = JSON.parse(localStorage.getItem(STORAGE_KEYS.EXPENSES) || '[]');
                                        const filtered = allExpenses.filter(e => e.id !== expense.id);
                                        localStorage.setItem(STORAGE_KEYS.EXPENSES, JSON.stringify(filtered));
                                        loadExpenses();
                                    }
                                },
                                className: 'action-btn delete-btn'
                            }, 'Delete')
                        ])
                    ])
                )
            ])
        };

        const App = () => {
            const [currentUser, setCurrentUser] = useState(null);

            useEffect(() => {
                initializeData();
                const savedUser = localStorage.getItem(STORAGE_KEYS.CURRENT_USER);
                if (savedUser) {
                    setCurrentUser(JSON.parse(savedUser));
                }
            }, []);

            const logout = () => {
                setCurrentUser(null);
                localStorage.removeItem(STORAGE_KEYS.CURRENT_USER);
            };

            if (!currentUser) {
                return React.createElement(Login);
            }

            return React.createElement(AuthContext.Provider, {
                value: { currentUser, logout }
            }, React.createElement(Dashboard));
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
