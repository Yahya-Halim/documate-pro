<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truck Driver Expense Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .login-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        .logo { font-size: 48px; color: #667eea; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 2px solid #e1e5e9; border-radius: 8px; font-size: 16px; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #667eea; }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn:hover { opacity: 0.9; }
        .btn-small { padding: 8px 16px; width: auto; }
        .btn-success { background: #28a745; }
        .btn-danger { background: #dc3545; }
        .btn-secondary { background: #6c757d; }
        .error { background: #fee; color: #c53030; padding: 12px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #fecaca; }
        .dashboard { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid #f0f0f0; }
        .header h1 { color: #333; margin: 0; }
        .header .user-info { color: #666; font-size: 14px; }
        .logout-btn { background: #dc3545; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
        .expense-form { background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 30px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-row-full { margin-bottom: 20px; }
        .form-row-full textarea { min-height: 100px; resize: vertical; }
        .tag-buttons { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .tag-btn { padding: 8px 16px; border: 2px solid #e1e5e9; background: white; border-radius: 20px; cursor: pointer; transition: all 0.3s; }
        .tag-btn.active { background: #667eea; color: white; border-color: #667eea; }
        .expense-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .expense-card { background: white; border: 2px solid #e1e5e9; border-radius: 12px; padding: 20px; transition: transform 0.3s, box-shadow 0.3s; }
        .expense-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .expense-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 15px; }
        .expense-title { font-size: 18px; font-weight: 600; color: #333; margin: 0; }
        .expense-amount { font-size: 20px; font-weight: bold; color: #28a745; }
        .expense-description { color: #666; margin-bottom: 15px; line-height: 1.5; }
        .expense-meta { font-size: 14px; color: #999; margin-bottom: 15px; }
        .expense-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .expense-tag { background: #e9ecef; color: #495057; padding: 4px 12px; border-radius: 12px; font-size: 12px; }
        .expense-actions { display: flex; gap: 10px; }
        .action-btn { padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .search-bar { display: flex; gap: 15px; margin-bottom: 30px; align-items: center; }
        .search-input { flex: 1; padding: 12px; border: 2px solid #e1e5e9; border-radius: 8px; font-size: 16px; }
        .add-expense-btn { background: #28a745; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .total-display { background: linear-gradient(135deg, #28a745 0%, #20c997 100%); color: white; padding: 20px; border-radius: 8px; font-size: 18px; font-weight: bold; text-align: center; margin-bottom: 30px; }
        .hidden { display: none; }
        .flex { display: flex; gap: 10px; }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-container">
        <div class="login-card">
            <div class="logo">
                <i class="fas fa-truck"></i>
            </div>
            <h2>Expense Tracker</h2>
            <p>Truck Driver Management</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter username" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>
                
                <div id="loginError" class="error hidden"></div>
                
                <button type="submit" class="btn">Sign In</button>
            </form>
            
            <div style="margin-top: 20px; font-size: 14px; color: #666;">
                Default: admin / admin123
            </div>
        </div>
    </div>

    <!-- Dashboard Screen -->
    <div id="dashboardScreen" class="container hidden">
        <div class="dashboard">
            <div class="header">
                <h1>Expense Management System</h1>
                <div>
                    <div class="user-info" id="userInfo">Welcome</div>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            </div>

            <div class="total-display" id="totalDisplay">
                Total Expenses: $0.00
            </div>

            <div class="search-bar">
                <input type="text" id="searchInput" class="search-input" placeholder="Search expenses...">
                <button id="addExpenseBtn" class="add-expense-btn hidden">
                    <i class="fas fa-plus" style="margin-right: 8px;"></i>
                    Add Expense
                </button>
            </div>

            <div class="tag-buttons" id="filterTags">
                <!-- Tags will be inserted here -->
            </div>

            <!-- Add Expense Form -->
            <div id="expenseForm" class="expense-form hidden">
                <h3>Add New Expense</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label for="expenseTitle">Title</label>
                        <input type="text" id="expenseTitle" placeholder="Expense Title">
                    </div>
                    <div class="form-group">
                        <label for="expenseAmount">Amount</label>
                        <input type="number" id="expenseAmount" placeholder="Amount">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="expenseDate">Date</label>
                        <input type="date" id="expenseDate">
                    </div>
                    <div class="form-group">
                        <label>Tags</label>
                        <div id="expenseTags" class="tag-buttons">
                            <!-- Tags will be inserted here -->
                        </div>
                    </div>
                </div>
                <div class="form-row-full">
                    <label for="expenseDescription">Description</label>
                    <textarea id="expenseDescription" placeholder="Description"></textarea>
                </div>
                <div class="flex">
                    <button class="btn btn-success" onclick="saveExpense()">Save Expense</button>
                    <button class="btn btn-secondary" onclick="cancelExpense()">Cancel</button>
                </div>
            </div>

            <!-- Expenses Grid -->
            <div class="expense-grid" id="expensesGrid">
                <!-- Expenses will be inserted here -->
            </div>
        </div>
    </div>

    <script>
        // Storage Keys
        const STORAGE_KEYS = {
            USERS: 'tdems_users',
            EXPENSES: 'tdems_expenses',
            TAGS: 'tdems_tags',
            CURRENT_USER: 'tdems_current_user'
        };

        // Default Tags
        const DEFAULT_TAGS = [
            { id: 'fuel', name: 'Fuel', color: '#dc3545' },
            { id: 'maintenance', name: 'Maintenance', color: '#fd7e14' },
            { id: 'food', name: 'Food', color: '#28a745' },
            { id: 'lodging', name: 'Lodging', color: '#17a2b8' },
            { id: 'tolls', name: 'Tolls', color: '#6f42c1' },
            { id: 'insurance', name: 'Insurance', color: '#e83e8c' },
            { id: 'supplies', name: 'Supplies', color: '#6610f2' },
            { id: 'other', name: 'Other', color: '#6c757d' }
        ];

        // Global Variables
        let currentUser = null;
        let expenses = [];
        let tags = [];
        let selectedFilterTags = [];
        let selectedExpenseTags = [];

        // Initialize Application
        function init() {
            initializeData();
            checkAuth();
            setupEventListeners();
        }

        // Initialize Data
        function initializeData() {
            // Initialize Users
            const users = JSON.parse(localStorage.getItem(STORAGE_KEYS.USERS) || '[]');
            if (users.length === 0) {
                const defaultAdmin = {
                    id: 'admin-001',
                    username: 'admin',
                    password: 'admin123',
                    role: 'admin',
                    name: 'Fleet Manager',
                    createdAt: new Date().toISOString()
                };
                localStorage.setItem(STORAGE_KEYS.USERS, JSON.stringify([defaultAdmin]));
            }

            // Initialize Tags
            const storedTags = JSON.parse(localStorage.getItem(STORAGE_KEYS.TAGS) || '[]');
            if (storedTags.length === 0) {
                localStorage.setItem(STORAGE_KEYS.TAGS, JSON.stringify(DEFAULT_TAGS));
            }
            tags = JSON.parse(localStorage.getItem(STORAGE_KEYS.TAGS) || '[]');
        }

        // Check Authentication
        function checkAuth() {
            const savedUser = localStorage.getItem(STORAGE_KEYS.CURRENT_USER);
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                showDashboard();
            } else {
                showLogin();
            }
        }

        // Setup Event Listeners
        function setupEventListeners() {
            // Login Form
            document.getElementById('loginForm').addEventListener('submit', handleLogin);

            // Search
            document.getElementById('searchInput').addEventListener('input', filterExpenses);

            // Add Expense Button
            document.getElementById('addExpenseBtn').addEventListener('click', showExpenseForm);
        }

        // Show Login Screen
        function showLogin() {
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('dashboardScreen').classList.add('hidden');
        }

        // Show Dashboard
        function showDashboard() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('dashboardScreen').classList.remove('hidden');
            
            // Update User Info
            document.getElementById('userInfo').textContent = 
                `Welcome, ${currentUser.name} (${currentUser.role})`;

            // Show Add Expense Button for Drivers
            if (currentUser.role === 'driver') {
                document.getElementById('addExpenseBtn').classList.remove('hidden');
            }

            loadExpenses();
            renderTags();
            renderExpenses();
        }

        // Handle Login
        function handleLogin(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');

            const users = JSON.parse(localStorage.getItem(STORAGE_KEYS.USERS) || '[]');
            const user = users.find(u => u.username === username && u.password === password);

            if (user) {
                localStorage.setItem(STORAGE_KEYS.CURRENT_USER, JSON.stringify(user));
                currentUser = user;
                showDashboard();
            } else {
                errorDiv.textContent = 'Invalid username or password';
                errorDiv.classList.remove('hidden');
            }
        }

        // Logout
        function logout() {
            localStorage.removeItem(STORAGE_KEYS.CURRENT_USER);
            currentUser = null;
            showLogin();
            // Clear form
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('loginError').classList.add('hidden');
        }

        // Load Expenses
        function loadExpenses() {
            expenses = JSON.parse(localStorage.getItem(STORAGE_KEYS.EXPENSES) || '[]');
        }

        // Save Expense
        function saveExpense() {
            const title = document.getElementById('expenseTitle').value;
            const amount = document.getElementById('expenseAmount').value;
            const date = document.getElementById('expenseDate').value;
            const description = document.getElementById('expenseDescription').value;

            if (!title || !amount) {
                alert('Please fill required fields');
                return;
            }

            const expense = {
                id: 'exp-' + Date.now(),
                title: title,
                amount: parseFloat(amount),
                date: date,
                description: description,
                tags: selectedExpenseTags,
                driverId: currentUser.id,
                driverName: currentUser.name,
                driverUsername: currentUser.username,
                createdAt: new Date().toISOString()
            };

            expenses.push(expense);
            localStorage.setItem(STORAGE_KEYS.EXPENSES, JSON.stringify(expenses));

            // Reset Form
            document.getElementById('expenseTitle').value = '';
            document.getElementById('expenseAmount').value = '';
            document.getElementById('expenseDescription').value = '';
            document.getElementById('expenseDate').value = new Date().toISOString().split('T')[0];
            selectedExpenseTags = [];

            hideExpenseForm();
            renderExpenses();
            renderTags();
        }

        // Cancel Expense
        function cancelExpense() {
            hideExpenseForm();
        }

        // Show Expense Form
        function showExpenseForm() {
            document.getElementById('expenseForm').classList.remove('hidden');
            document.getElementById('expenseDate').value = new Date().toISOString().split('T')[0];
            renderExpenseTags();
        }

        // Hide Expense Form
        function hideExpenseForm() {
            document.getElementById('expenseForm').classList.add('hidden');
        }

        // Delete Expense
        function deleteExpense(expenseId) {
            if (confirm('Delete this expense?')) {
                expenses = expenses.filter(e => e.id !== expenseId);
                localStorage.setItem(STORAGE_KEYS.EXPENSES, JSON.stringify(expenses));
                renderExpenses();
            }
        }

        // Filter Expenses
        function filterExpenses() {
            renderExpenses();
        }

        // Toggle Filter Tag
        function toggleFilterTag(tagId) {
            const index = selectedFilterTags.indexOf(tagId);
            if (index > -1) {
                selectedFilterTags.splice(index, 1);
            } else {
                selectedFilterTags.push(tagId);
            }
            renderTags();
            renderExpenses();
        }

        // Toggle Expense Tag
        function toggleExpenseTag(tagId) {
            const index = selectedExpenseTags.indexOf(tagId);
            if (index > -1) {
                selectedExpenseTags.splice(index, 1);
            } else {
                selectedExpenseTags.push(tagId);
            }
            renderExpenseTags();
        }

        // Get Filtered Expenses
        function getFilteredExpenses() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();

            return expenses.filter(expense => {
                // Search filter
                const matchesSearch = 
                    expense.title.toLowerCase().includes(searchTerm) ||
                    expense.description.toLowerCase().includes(searchTerm) ||
                    expense.driverName.toLowerCase().includes(searchTerm);

                // Tag filter
                const matchesTags = selectedFilterTags.length === 0 || 
                    selectedFilterTags.some(tagId => expense.tags.includes(tagId));

                // Role filter
                if (currentUser.role === 'driver') {
                    return matchesSearch && matchesTags && expense.driverId === currentUser.id;
                }

                return matchesSearch && matchesTags;
            });
        }

        // Format Currency
        function formatCurrency(amount) {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD'
            }).format(amount);
        }

        // Render Tags
        function renderTags() {
            const container = document.getElementById('filterTags');
            container.innerHTML = '';

            tags.forEach(tag => {
                const button = document.createElement('button');
                button.className = 'tag-btn';
                button.textContent = tag.name;
                
                if (selectedFilterTags.includes(tag.id)) {
                    button.classList.add('active');
                    button.style.backgroundColor = tag.color;
                    button.style.color = 'white';
                    button.style.borderColor = tag.color;
                }

                button.onclick = () => toggleFilterTag(tag.id);
                container.appendChild(button);
            });
        }

        // Render Expense Tags
        function renderExpenseTags() {
            const container = document.getElementById('expenseTags');
            container.innerHTML = '';

            tags.forEach(tag => {
                const button = document.createElement('button');
                button.className = 'tag-btn';
                button.textContent = tag.name;
                
                if (selectedExpenseTags.includes(tag.id)) {
                    button.classList.add('active');
                    button.style.backgroundColor = tag.color;
                    button.style.color = 'white';
                    button.style.borderColor = tag.color;
                }

                button.onclick = () => toggleExpenseTag(tag.id);
                container.appendChild(button);
            });
        }

        // Render Expenses
        function renderExpenses() {
            const container = document.getElementById('expensesGrid');
            const filteredExpenses = getFilteredExpenses();
            
            // Update Total
            const total = filteredExpenses.reduce((sum, exp) => sum + exp.amount, 0);
            document.getElementById('totalDisplay').textContent = 
                `Total Expenses: ${formatCurrency(total)}`;

            // Clear container
            container.innerHTML = '';

            // Render expense cards
            filteredExpenses.forEach(expense => {
                const card = document.createElement('div');
                card.className = 'expense-card';

                const expenseTagsHtml = expense.tags.map(tagId => {
                    const tag = tags.find(t => t.id === tagId);
                    return tag ? `<span class="expense-tag" style="background-color: ${tag.color}20; color: ${tag.color}">${tag.name}</span>` : '';
                }).join('');

                const canDelete = currentUser.role === 'admin' || expense.driverId === currentUser.id;

                card.innerHTML = `
                    <div class="expense-header">
                        <h3 class="expense-title">${expense.title}</h3>
                        <div class="expense-amount">${formatCurrency(expense.amount)}</div>
                    </div>
                    <p class="expense-description">${expense.description}</p>
                    <div class="expense-tags">${expenseTagsHtml}</div>
                    <div class="expense-meta">
                        Driver: ${expense.driverName}<br>
                        Date: ${new Date(expense.date).toLocaleDateString()}
                    </div>
                    <div class="expense-actions">
                        ${canDelete ? `<button class="action-btn btn-danger" onclick="deleteExpense('${expense.id}')">Delete</button>` : ''}
                    </div>
                `;

                container.appendChild(card);
            });
        }

        // Initialize when DOM is loaded
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
