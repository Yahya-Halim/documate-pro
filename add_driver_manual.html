<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Driver - Manual Setup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 p-8">
    <div class="max-w-md mx-auto bg-white rounded-lg shadow-lg p-6">
        <h1 class="text-2xl font-bold text-gray-800 mb-6">Add Driver Manually</h1>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Driver Name</label>
                <input type="text" id="driverName" class="w-full px-4 py-2 border border-gray-300 rounded-lg" placeholder="Enter full name">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Username</label>
                <input type="text" id="username" class="w-full px-4 py-2 border border-gray-300 rounded-lg" placeholder="Enter username">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                <input type="password" id="password" class="w-full px-4 py-2 border border-gray-300 rounded-lg" placeholder="Enter password">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Role</label>
                <select id="role" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                    <option value="driver">Driver</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
        </div>
        
        <div class="flex gap-2 mt-6">
            <button onclick="addDriver()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
                <i class="fas fa-plus mr-2"></i>Add Driver
            </button>
            <button onclick="viewDrivers()" class="bg-gray-600 text-white px-4 py-2 rounded-lg hover:bg-gray-700">
                <i class="fas fa-list mr-2"></i>View Drivers
            </button>
        </div>
        
        <div id="message" class="mt-4 p-3 rounded-lg hidden"></div>
        
        <div id="driversList" class="mt-6 hidden">
            <h2 class="text-lg font-semibold mb-4">Current Drivers</h2>
            <div id="driversTable" class="bg-white rounded-lg shadow overflow-hidden"></div>
        </div>
    </div>

    <script>
        const STORAGE_KEYS = {
            USERS: 'tdems_users',
            CURRENT_USER: 'tdems_current_user'
        };

        function generateDriverId() {
            const randomNum = Math.floor(1000 + Math.random() * 9000);
            return `DR-${randomNum}`;
        }

        function showMessage(text, type = 'success') {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `mt-4 p-3 rounded-lg ${type === 'success' ? 'bg-green-100 text-green-700 border border-green-200' : 'bg-red-100 text-red-700 border border-red-200'}`;
            messageDiv.classList.remove('hidden');
            
            setTimeout(() => {
                messageDiv.classList.add('hidden');
            }, 3000);
        }

        function addDriver() {
            const name = document.getElementById('driverName').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const role = document.getElementById('role').value;

            if (!name || !username || !password) {
                showMessage('Please fill all fields', 'error');
                return;
            }

            const users = JSON.parse(localStorage.getItem(STORAGE_KEYS.USERS) || '[]');
            
            // Check if username already exists
            if (users.find(u => u.username === username)) {
                showMessage('Username already exists', 'error');
                return;
            }

            const driver = {
                id: role === 'driver' ? generateDriverId() : `admin-${Date.now()}`,
                username,
                password,
                role,
                name,
                createdAt: new Date().toISOString()
            };

            users.push(driver);
            localStorage.setItem(STORAGE_KEYS.USERS, JSON.stringify(users));
            
            // Clear form
            document.getElementById('driverName').value = '';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('role').value = 'driver';
            
            showMessage(`Driver ${name} added successfully! ID: ${driver.id}`);
            viewDrivers(); // Refresh the list
        }

        function viewDrivers() {
            const driversList = document.getElementById('driversList');
            const driversTable = document.getElementById('driversTable');
            
            const users = JSON.parse(localStorage.getItem(STORAGE_KEYS.USERS) || '[]');
            
            if (users.length === 0) {
                driversTable.innerHTML = '<p class="text-gray-500 p-4">No drivers found</p>';
            } else {
                let tableHTML = `
                    <table class="w-full">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Name</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Username</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Role</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="bg-white divide-y divide-gray-200">
                `;
                
                users.forEach(user => {
                    tableHTML += `
                        <tr class="hover:bg-gray-50">
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${user.id}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${user.name}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${user.username}</td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span class="inline-flex px-2 py-1 text-xs font-semibold rounded-full ${
                                    user.role === 'admin' 
                                        ? 'bg-purple-100 text-purple-800' 
                                        : 'bg-blue-100 text-blue-800'
                                }">
                                    ${user.role}
                                </span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm">
                                ${user.username !== 'admin' ? `
                                    <button onclick="deleteDriver('${user.id}')" class="text-red-600 hover:text-red-900">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                ` : '<span class="text-gray-400">Protected</span>'}
                            </td>
                        </tr>
                    `;
                });
                
                tableHTML += `
                        </tbody>
                    </table>
                `;
                
                driversTable.innerHTML = tableHTML;
            }
            
            driversList.classList.remove('hidden');
        }

        function deleteDriver(userId) {
            if (confirm('Are you sure you want to delete this driver?')) {
                const users = JSON.parse(localStorage.getItem(STORAGE_KEYS.USERS) || '[]');
                const filtered = users.filter(u => u.id !== userId);
                localStorage.setItem(STORAGE_KEYS.USERS, JSON.stringify(filtered));
                viewDrivers(); // Refresh the list
                showMessage('Driver deleted successfully');
            }
        }

        // Load drivers on page load
        window.onload = function() {
            viewDrivers();
        };
    </script>
</body>
</html>
